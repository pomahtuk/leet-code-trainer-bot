statement: >
  Given strings s1, s2, and s3, find whether s3 is formed by an interleaving of s1 and s2. An interleaving of two
  strings s and t is a configuration where s and t are divided into n and m substrings respectively, such that s = s1 +
  s2 + ... + sn, t = t1 + t2 + ... + tm, |n - m| <= 1, and the interleaving is s1 + t1 + s2 + t2... or t1 + s1 + t2 +
  s2...
quiz:
  - question: Why is a simple two-pointer approach insufficient for this problem?
    options:
      - When both s1[i] and s2[j] match s3[k], a greedy choice might lead to a dead end.
      - The two-pointer approach only works if s1 and s2 have different characters.
      - Two pointers cannot handle strings of different lengths.
      - The time complexity of two pointers would be O(N^3).
    correct: 0
    hint: Think about cases like s1='aab', s2='aac', s3='aaaabc'.
  - question: What is the optimal space complexity for this problem?
    options:
      - O(min(m, n)) where m and n are lengths of s1 and s2.
      - O(m * n) using a 2D DP table.
      - O(1) using bit manipulation.
      - O(m + n) using a recursive stack.
    correct: 0
    hint: Since each state only depends on the current and previous row/column, can we optimize the DP table?
solution:
  explanation: >
    We use DP where dp[i][j] indicates if s3[0...i+j-1] is an interleaving of s1[0...i-1] and s2[0...j-1]. The state
    depends on whether the last character of s3 matches s1[i-1] (and dp[i-1][j] is true) or s2[j-1] (and dp[i][j-1] is
    true).
  pseudocode: |
    if s1.len + s2.len != s3.len return false
    dp = array of size s2.len + 1
    for i from 0 to s1.len:
      for j from 0 to s2.len:
        if i==0 and j==0: dp[j] = true
        else if i==0: dp[j] = dp[j-1] && s2[j-1] == s3[j-1]
        else if j==0: dp[j] = dp[j] && s1[i-1] == s3[i-1]
        else: dp[j] = (dp[j] && s1[i-1] == s3[i+j-1]) || (dp[j-1] && s2[j-1] == s3[i+j-1])
    return dp[s2.len]
  java: |
    public boolean isInterleave(String s1, String s2, String s3) {
        if (s1.length() + s2.length() != s3.length()) return false;
        boolean[] dp = new boolean[s2.length() + 1];
        for (int i = 0; i <= s1.length(); i++) {
            for (int j = 0; j <= s2.length(); j++) {
                if (i == 0 && j == 0) dp[j] = true;
                else if (i == 0) dp[j] = dp[j - 1] && s2.charAt(j - 1) == s3.charAt(j - 1);
                else if (j == 0) dp[j] = dp[j] && s1.charAt(i - 1) == s3.charAt(i - 1);
                else dp[j] = (dp[j] && s1.charAt(i - 1) == s3.charAt(i + j - 1)) || 
                             (dp[j - 1] && s2.charAt(j - 1) == s3.charAt(i + j - 1));
            }
        }
        return dp[s2.length()];
    }
