statement: >
  There is a forest with an unknown number of rabbits. We asked n rabbits "How many other rabbits have the same color as
  you?" and collected the answers in an integer array answers where answers[i] is the answer of the ith rabbit. Given
  the array answers, return the minimum number of rabbits that could be in the forest.
quiz:
  - question: Which strategy is most effective for calculating the minimum number of rabbits?
    options:
      - Group rabbits by their answers and use greedy math to determine group counts
      - Sort the array and use a sliding window to find unique colors
      - Use a Union-Find data structure to group rabbits with the same answer
      - Use Dynamic Programming to minimize the total sum of the array
    correct: 0
    hint: Rabbits giving the same answer 'x' can only belong to the same color group if there are at most x+1 of them.
  - question: If k rabbits all answer 'x', what formula calculates the minimum rabbits required for those k?
    options:
      - ((k + x) / (x + 1)) * (x + 1)
      - k + x
      - Math.pow(x + 1, k)
      - k * x
    correct: 0
    hint: You need to find the number of groups of size (x+1) required to cover k rabbits.
  - question: What is the time and space complexity of the frequency-based approach?
    options:
      - O(N) time and O(N) space
      - O(N log N) time and O(1) space
      - O(N^2) time and O(N) space
      - O(N) time and O(1) space
    correct: 0
    hint: We iterate through the input once and store counts for up to N unique answers.
solution:
  explanation: >
    Count the frequency of each answer 'x'. Each group of color 'C' can contain at most x+1 rabbits.  If 'k' rabbits
    answer 'x', we need ceil(k / (x+1)) groups, each having x+1 rabbits.
  pseudocode: |
    countMap = {}
    total = 0
    for x in answers:
      countMap[x]++
    for x, k in countMap:
      groups = (k + x) // (x + 1)
      total += groups * (x + 1)
    return total
  java: |
    public int numRabbits(int[] answers) {
        int[] counts = new int[1000];
        int res = 0;
        for (int x : answers) {
            if (counts[x] == 0) res += x + 1;
            counts[x]++;
            if (counts[x] == x + 1) counts[x] = 0;
        }
        return res;
    }
