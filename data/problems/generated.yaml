      correct: 0
      hint: The left subtree contains nodes from 1 to i-1, and the right contains nodes from i+1 to n.
  solution:
    explanation: >
      The problem is solved using Dynamic Programming to calculate Catalan numbers. For a sequence of length n, each
      number i can be a root, resulting in dp[i-1] left subtree combinations and dp[n-i] right subtree combinations.
    pseudocode: |
      dp = array of size n + 1, initialized to 0
      dp[0] = 1, dp[1] = 1
      for i from 2 to n:
        for j from 1 to i:
          dp[i] += dp[j-1] * dp[i-j]
      return dp[n]
    java: |
      public int numTrees(int n) {
          int[] dp = new int[n + 1];
          dp[0] = 1; dp[1] = 1;
          for (int i = 2; i <= n; i++) {
              for (int j = 1; j <= i; j++) {
                  dp[i] += dp[j - 1] * dp[i - j];
              }
          }
          return dp[n];
      }
