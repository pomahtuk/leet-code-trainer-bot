  solution:
    explanation: >
      The optimal approach uses a bottom-up DFS. For each node, we recursively find the height of its children. If any
      subtree is unbalanced (difference > 1) or already marked as -1, we propagate -1 upwards; otherwise, we return the
      actual height.
    pseudocode: |
      function check(node):
        if node is null: return 0
        left = check(node.left)
        right = check(node.right)
        if left == -1 or right == -1 or abs(left - right) > 1: return -1
        return max(left, right) + 1
      return check(root) != -1
    java: |
      public boolean isBalanced(TreeNode root) {
          return dfs(root) != -1;
      }
      private int dfs(TreeNode root) {
          if (root == null) return 0;
          int l = dfs(root.left);
          int r = dfs(root.right);
          if (l == -1 || r == -1 || Math.abs(l - r) > 1) return -1;
          return Math.max(l, r) + 1;
      }
