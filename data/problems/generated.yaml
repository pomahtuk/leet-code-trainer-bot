  statement: >
    Given a signed 32-bit integer x, return x with its digits reversed. If reversing x causes the value to go outside
    the signed 32-bit integer range [-231, 231 - 1], then return 0. Assume the environment does not allow you to store
    64-bit integers.
  quiz:
    - question: What is the most efficient way to reverse the digits without using 64-bit integers?
      options:
        - Pop digits using modulo 10 and push to a new integer, checking for overflow before multiplying.
        - Convert the integer to a String, reverse the String, and parse it back to an integer.
        - Use bitwise shift operations to reverse the binary representation.
        - Create an array of digits, reverse the array, and reconstruct the integer.
      correct: 0
      hint: Think about how you can extract the last digit of any number using the modulo operator.
    - question: Why must we perform an overflow check *before* multiplying the current result by 10?
      options:
        - Because the modulo operator only works on positive numbers.
        - Because the problem forbids using 64-bit storage to hold intermediate overflow values.
        - Because integer division in Java is slower than multiplication.
        - Because the result must be a signed 32-bit integer.
      correct: 1
      hint: If the result exceeds the max 32-bit integer, you cannot store it in a standard 'int' variable to check it later.
  solution:
    explanation: >
      Iteratively pop the last digit of x using modulo 10 and append it to the result. Before multiplying the result by
      10, check if the operation would exceed Integer.MAX_VALUE or fall below Integer.MIN_VALUE by dividing the bounds
      by 10.
    pseudocode: |
      rev = 0
      while x != 0:
        pop = x % 10
        x /= 10
        if rev > MAX/10 or (rev == MAX/10 and pop > 7): return 0
        if rev < MIN/10 or (rev == MIN/10 and pop < -8): return 0
        rev = rev * 10 + pop
      return rev
    java: |
      public int reverse(int x) {
        int rev = 0;
        while (x != 0) {
          int pop = x % 10;
          x /= 10;
          if (rev > Integer.MAX_VALUE/10 || (rev == Integer.MAX_VALUE/10 && pop > 7)) return 0;
          if (rev < Integer.MIN_VALUE/10 || (rev == Integer.MIN_VALUE/10 && pop < -8)) return 0;
          rev = rev * 10 + pop;
        }
        return rev;
      }
