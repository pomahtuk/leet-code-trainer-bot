    explanation: >
      Maintain four boundaries (top, bottom, left, right) and iterate in a loop, filling elements while
      incrementing/decrementing boundaries. Continue until the count reaches n^2.
    pseudocode: |
      left, right, top, bottom = 0, n-1, 0, n-1, num = 1
      while num <= n*n:
        fill top row, top++
        fill right col, right--
