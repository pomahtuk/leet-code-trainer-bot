  statement: >
    Given an array of integers nums and an integer target, return indices of the two numbers such that they add up to
    target.
  quiz:
    - question: Which approach achieves the optimal O(n) time complexity for Two Sum?
      options:
        - Using a Hash Map to store visited numbers and their indices.
        - Nested loops comparing every pair of elements.
        - Sorting the array and using two pointers.
        - Binary search for each element in the array.
      correct: 0
      hint: Think about how to look up the 'complement' (target - current) in constant time.
    - question: What is the space complexity of the optimal Hash Map solution?
      options:
        - O(1)
        - O(n)
        - O(log n)
        - O(n^2)
      correct: 1
      hint: Consider how many elements you might need to store in the map in the worst case.
  solution:
    explanation: >
      By using a Hash Map, we can store each number's index as we iterate. For every number, we check if its complement
      (target - current) exists in the map, allowing us to solve it in a single pass.
    pseudocode: |
      map = empty map
      for i, num in enumerate(nums):
        complement = target - num
        if complement in map: return [map[complement], i]
        map[num] = i
    java: |
      public int[] twoSum(int[] nums, int target) {
          Map<Integer, Integer> map = new HashMap<>();
          for (int i = 0; i < nums.length; i++) {
              int complement = target - nums[i];
              if (map.containsKey(complement)) return new int[]{map.get(complement), i};
              map.put(nums[i], i);
          }
          return new int[0];
      }
