        - O(n²) time and O(1) space
      correct: 0
      hint: We traverse the list once and only use a few extra pointers.
    - question: Why is it important to set the 'next' pointer of the last node in the 'after' list to null?
      options:
        - To prevent a cycle in the final linked list.
        - To satisfy Java's memory management requirements.
        - To indicate the end of the 'before' partition.
        - It is not necessary; the tail will naturally be null.
      correct: 0
      hint: The last node in the 'after' list might still point to a node that was moved to the 'before' list.
  solution:
    explanation: >
      Create two dummy heads to start two separate lists: one for nodes less than x and one for nodes greater than or
      equal to x. Traverse the original list, appending each node to the end of the appropriate sub-list. Finally,
      connect the 'before' list to the 'after' list and ensure the tail of the 'after' list points to null.
    pseudocode: |
      before_head = dummy, after_head = dummy
      curr_before = before_head, curr_after = after_head
      while head:
        if head.val < x:
          curr_before.next = head, curr_before = head
        else:
          curr_after.next = head, curr_after = head
        head = head.next
      curr_after.next = null
      curr_before.next = after_head.next
      return before_head.next
    java: |
      public ListNode partition(ListNode head, int x) {
          ListNode bHead = new ListNode(0), aHead = new ListNode(0);
          ListNode b = bHead, a = aHead;
          while (head != null) {
              if (head.val < x) { b.next = head; b = b.next; }
              else { a.next = head; a = a.next; }
              head = head.next;
          }
          a.next = null;
          b.next = aHead.next;
          return bHead.next;
      }
