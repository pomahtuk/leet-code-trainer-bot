    - question: What is the most effective approach to handle duplicates when generating permutations?
      options:
        - Sort the input array and skip adjacent identical elements during recursion.
        - Use a HashSet to store all permutations and convert to a list at the end.
        - Divide the input by the factorial of the frequency of each digit.
        - Use a bitmask to represent which indices are visited.
      correct: 0
      hint: Sorting brings duplicates together, allowing you to use a condition like 'if (i > 0 && nums[i] == nums[i-1] &&
        !used[i-1]) continue'.
    - question: What is the worst-case time complexity of this algorithm?
      options:
        - O(n)
        - O(n^2)
        - O(n * n!)
        - O(2^n)
      correct: 2
      hint: Consider that there are at most n! permutations, and each takes O(n) to construct.
  solution:
    explanation: >
      Sort the array first to handle duplicates easily. Use a boolean array to track visited elements, and skip an
      element if it's identical to the previous one and the previous one was not used in the current recursion branch.
    pseudocode: |
      sort(nums)
      backtrack(path):
        if path.size == nums.size: add path to results
        for i in 0 to nums.size:
          if used[i] or (i > 0 and nums[i] == nums[i-1] and !used[i-1]): continue
          used[i] = true, path.add(nums[i]), backtrack(path)
          used[i] = false, path.removeLast()
    java: |
      void backtrack(List<List<Integer>> res, List<Integer> path, int[] nums, boolean[] used) {
        if (path.size() == nums.length) { res.add(new ArrayList<>(path)); return; }
        for (int i = 0; i < nums.length; i++) {
          if (used[i] || (i > 0 && nums[i] == nums[i-1] && !used[i-1])) continue;
          used[i] = true; path.add(nums[i]);
          backtrack(res, path, nums, used);
          used[i] = false; path.remove(path.size() - 1);
        }
      }
