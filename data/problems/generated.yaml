  statement: >
    There is a robot on an m x n grid. The robot is initially located at the top-left corner. The robot tries to move to
    the bottom-right corner. The robot can only move either down or right at any point in time. Given m and n, return
    the number of possible unique paths.
  quiz:
    - question: Which approach is most efficient to solve this problem?
      options:
        - Dynamic Programming
        - Breadth-First Search
        - Backtracking with memoization
        - Greedy algorithm
      correct: 0
      hint: Think about overlapping subproblems where the number of paths to a cell is the sum of paths from the top and left
        neighbors.
