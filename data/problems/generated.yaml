      correct: 0
      hint: This technique uses threading to traverse the tree without using a stack or recursion.
  solution:
    explanation: >
      In-order traversal of a BST should be sorted. Swapping two nodes creates one or two 'drops' in the sequence. We
      track the first and last occurrence where `prev.val > current.val` and swap them.
    pseudocode: |
      first = second = prev = null
      function find(node):
        if !node return
        find(node.left)
        if prev and prev.val > node.val:
          if !first: first = prev
          second = node
        prev = node
        find(node.right)
      find(root)
      swap(first.val, second.val)
    java: |
      TreeNode first, second, prev;
      public void recoverTree(TreeNode root) {
          traverse(root);
          int temp = first.val;
          first.val = second.val;
          second.val = temp;
      }
      private void traverse(TreeNode root) {
          if (root == null) return;
          traverse(root.left);
          if (prev != null && prev.val > root.val) {
              if (first == null) first = prev;
              second = root;
          }
          prev = root;
          traverse(root.right);
      }
