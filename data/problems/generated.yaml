  solution:
    explanation: >
      Binary search is used to find the target. If the target is not present, the 'left' pointer eventually moves to the
      first element greater than the target, which is exactly the insertion index.
    pseudocode: |
      left = 0, right = nums.length - 1
      while left <= right:
        mid = left + (right - left) / 2
        if nums[mid] == target: return mid
        if nums[mid] < target: left = mid + 1
        else: right = mid - 1
