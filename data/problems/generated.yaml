  solution:
    explanation: >
      Use a greedy approach by iterating through a pre-defined list of symbol-value pairs in descending order. Subtract
      the largest possible value repeatedly until the remaining number is zero.
    pseudocode: |
      values = [1000, 900, 500, 400, 100, 90, 50, 40, 10, 9, 5, 4, 1]
      symbols = ["M", "CM", "D", "CD", "C", "XC", "L", "XL", "X", "IX", "V", "IV", "I"]
      for i in range(len(values)):
        while num >= values[i]:
          res += symbols[i]
          num -= values[i]
    java: |
      public String intToRoman(int num) {
          int[] vals = {1000, 900, 500, 400, 100, 90, 50, 40, 10, 9, 5, 4, 1};
          String[] syms = {"M", "CM", "D", "CD", "C", "XC", "L", "XL", "X", "IX", "V", "IV", "I"};
          StringBuilder sb = new StringBuilder();
          for (int i = 0; i < vals.length; i++) {
              while (num >= vals[i]) {
                  num -= vals[i];
                  sb.append(syms[i]);
              }
          }
          return sb.toString();
      }
