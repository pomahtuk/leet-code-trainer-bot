        - The maximum value in candidates
        - The number of digits in the target
      correct: 1
      hint: The output size is constrained, and the complexity depends on the number of valid paths found.
  solution:
    explanation: >
      Use backtracking to explore paths, subtracting the current candidate from the target. Since numbers can be reused,
      pass the current index to the next recursive call to allow picking the same element again.
    pseudocode: |
      solve(target, start, path):
        if target == 0: add path to results
        if target < 0: return
        for i from start to len(candidates):
          solve(target - candidates[i], i, path + candidates[i])
    java: |
      public List<List<Integer>> combinationSum(int[] candidates, int target) {
          List<List<Integer>> res = new ArrayList<>();
          backtrack(res, new ArrayList<>(), candidates, target, 0);
          return res;
      }
      private void backtrack(List<List<Integer>> res, List<Integer> cur, int[] c, int t, int s) {
          if (t < 0) return;
          if (t == 0) { res.add(new ArrayList<>(cur)); return; }
          for (int i = s; i < c.length; i++) {
              cur.add(c[i]);
              backtrack(res, cur, c, t - c[i], i);
              cur.remove(cur.size() - 1);
          }
      }
