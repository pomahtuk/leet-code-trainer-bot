        - O(N)
        - O(N^2)
        - O(log N)
      correct: 1
      hint: We only visit each interval in the input list exactly once.
  solution:
    explanation: >
      Iterate through the intervals and divide them into three parts: those before the new interval, the overlapping
      intervals that need merging, and those after the new interval. Merge by updating the new interval's start and end
      bounds during the overlapping phase.
    pseudocode: |
      Add intervals ending before newInterval starts.
      While intervals overlap with newInterval, update newInterval's range.
      Add the merged newInterval.
      Add remaining intervals.
    java: |
      public int[][] insert(int[][] intervals, int[] newInterval) {
          List<int[]> res = new ArrayList<>();
          int i = 0, n = intervals.length;
          while (i < n && intervals[i][1] < newInterval[0]) res.add(intervals[i++]);
          while (i < n && intervals[i][0] <= newInterval[1]) {
              newInterval[0] = Math.min(newInterval[0], intervals[i][0]);
              newInterval[1] = Math.max(newInterval[1], intervals[i][1]);
              i++;
          }
          res.add(newInterval);
          while (i < n) res.add(intervals[i++]);
          return res.toArray(new int[res.size()][]);
      }
