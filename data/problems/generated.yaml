  solution:
    explanation: >
      Map each character to its integer value. Traverse the string from right to left, keeping track of the previous
      value; if the current value is less than the previous, subtract it, otherwise add it.
    pseudocode: |
      total = 0, prev = 0
      for i from length-1 down to 0:
        curr = value(s[i])
        if curr < prev: total -= curr
        else: total += curr
        prev = curr
      return total
