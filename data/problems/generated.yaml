  solution:
    explanation: >
      The Dutch National Flag algorithm uses three pointers (low, mid, high). 'low' tracks the boundary of 0s, 'high'
      tracks the boundary of 2s, and 'mid' scans the array. We swap 0s to the front and 2s to the back.
    pseudocode: |
      low = 0, mid = 0, high = nums.length - 1
      while mid <= high:
        if nums[mid] == 0: swap(nums[low++], nums[mid++])
        else if nums[mid] == 1: mid++
        else: swap(nums[mid], nums[high--])
    java: |
      public void sortColors(int[] nums) {
          int low = 0, mid = 0, high = nums.length - 1;
          while (mid <= high) {
              if (nums[mid] == 0) {
                  int tmp = nums[low]; nums[low++] = nums[mid]; nums[mid++] = tmp;
              } else if (nums[mid] == 1) mid++;
              else {
                  int tmp = nums[high]; nums[high--] = nums[mid]; nums[mid] = tmp;
              }
          }
      }
