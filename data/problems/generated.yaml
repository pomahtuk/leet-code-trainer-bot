      To rotate 90 degrees clockwise, first transpose the matrix by swapping elements across the main diagonal
      (matrix[i][j] with matrix[j][i]). Then, reverse the elements in each row to achieve the final orientation.
    pseudocode: |
      for i from 0 to n-1:
        for j from i+1 to n-1:
          swap(matrix[i][j], matrix[j][i])
      for row in matrix:
        reverse(row)
    java: |
      public void rotate(int[][] matrix) {
          int n = matrix.length;
          for (int i = 0; i < n; i++) {
              for (int j = i + 1; j < n; j++) {
                  int temp = matrix[i][j];
                  matrix[i][j] = matrix[j][i];
                  matrix[j][i] = temp;
              }
          }
          for (int i = 0; i < n; i++) {
              for (int j = 0; j < n / 2; j++) {
                  int temp = matrix[i][j];
                  matrix[i][j] = matrix[i][n - 1 - j];
                  matrix[i][n - 1 - j] = temp;
              }
          }
      }
