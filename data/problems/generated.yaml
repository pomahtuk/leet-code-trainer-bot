        - O(n^2) time and O(1) space
      correct: 0
      hint: We only need to traverse the list once and use a fixed number of pointers.
  solution:
    explanation: >
      Use a dummy node to handle deletions at the head. Traverse the list; whenever a duplicate is detected, use a
      nested loop to skip all nodes sharing that specific value.
    pseudocode: |
      dummy = ListNode(0, head)
      prev = dummy
      while prev.next and prev.next.next:
          if prev.next.val == prev.next.next.val:
              val = prev.next.val
              while prev.next and prev.next.val == val:
                  prev.next = prev.next.next
          else:
              prev = prev.next
      return dummy.next
    java: |
      public ListNode deleteDuplicates(ListNode head) {
          ListNode dummy = new ListNode(0, head), prev = dummy;
          while (prev.next != null && prev.next.next != null) {
              if (prev.next.val == prev.next.next.val) {
                  int val = prev.next.val;
                  while (prev.next != null && prev.next.val == val)
                      prev.next = prev.next.next;
              } else {
                  prev = prev.next;
              }
          }
          return dummy.next;
      }
