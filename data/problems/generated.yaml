  statement: >
    The string "PAYPALISHIRING" is written in a zigzag pattern on a given number of rows like this: P   A   H   N A P L
    S I I G Y   I   R And then read line by line: "PAHNAPLSIIGYIR". Write the code to perform this conversion.
  quiz:
    - question: What is the most efficient approach to simulate the zigzag pattern?
      options:
        - Use an array of strings/builders to store characters for each row and track direction.
        - Create a 2D matrix of size numRows x s.length and fill it cell by cell.
        - Use recursion to place each character based on its index.
        - Sort the characters based on their calculated row index.
      correct: 0
      hint: Think about how you can determine which row a character belongs to without building a full grid.
    - question: What are the time and space complexities of the optimal solution?
      options:
        - O(n^2) time and O(n) space.
        - O(n) time and O(n) space.
        - O(n log n) time and O(1) space.
        - O(n) time and O(1) space.
      correct: 1
      hint: You visit each character exactly once, and you need to store the final string.
  solution:
    explanation: >
      Use an array of StringBuilders to represent each row. Iterate through the string, appending characters to the
      current row and toggling the direction when reaching the top or bottom row.
    pseudocode: |
      if numRows == 1 return s
      rows = array of StringBuilders
      currRow = 0, goingDown = false
      for char c in s:
        rows[currRow].append(c)
        if currRow == 0 or currRow == numRows - 1: goingDown = !goingDown
        currRow += goingDown ? 1 : -1
      return concat all rows
    java: |
      public String convert(String s, int numRows) {
          if (numRows == 1) return s;
          StringBuilder[] rows = new StringBuilder[numRows];
          for (int i = 0; i < numRows; i++) rows[i] = new StringBuilder();
          int curr = 0, delta = 0;
          for (char c : s.toCharArray()) {
              rows[curr].append(c);
              if (curr == 0 || curr == numRows - 1) delta = (curr == 0) ? 1 : -1;
              curr += delta;
          }
          StringBuilder res = new StringBuilder();
          for (StringBuilder sb : rows) res.append(sb);
          return res.toString();
      }
