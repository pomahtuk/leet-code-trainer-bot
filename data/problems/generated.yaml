      hint: The properties imply the entire matrix is strictly increasing in a 'Z' shape.
    - question: If 'idx' is the index in a flattened 1D version of an m x n matrix, what are the 2D coordinates (r, c)?
      options:
        - r = idx / m, c = idx % m
        - r = idx % n, c = idx / n
        - r = idx / n, c = idx % n
        - r = idx / (m*n), c = idx % (m*n)
      correct: 2
      hint: The number of columns (n) determines when a row wraps around.
  solution:
    explanation: >
      Since the matrix is fully sorted row-by-row, we treat it as a virtual 1D array of size m * n. We perform standard
      binary search on the range [0, m*n - 1] and map the middle index back to row and column indices.
    pseudocode: |
      left = 0, right = (m * n) - 1
      while left <= right:
        mid = left + (right - left) / 2
        val = matrix[mid / n][mid % n]
        if val == target: return true
        if val < target: left = mid + 1
        else: right = mid - 1
      return false
    java: |
      public boolean searchMatrix(int[][] matrix, int target) {
          int m = matrix.length, n = matrix[0].length;
          int left = 0, right = m * n - 1;
          while (left <= right) {
              int mid = left + (right - left) / 2;
              int val = matrix[mid / n][mid % n];
              if (val == target) return true;
              if (val < target) left = mid + 1;
              else right = mid - 1;
          }
          return false;
      }
