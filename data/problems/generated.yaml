  statement: >
    Given a non-negative integer x, return the square root of x rounded down to the nearest integer. The returned
    integer should be non-negative as well. You must not use any built-in exponent function or operator.
  quiz:
    - question: Which algorithm provides the most efficient approach for this problem?
      options:
        - Binary search on the range [0, x]
        - Linear scan from 1 to x
        - Newton's Method for root finding
        - Recursive backtracking
      correct: 0
      hint: Since the square root function is monotonically increasing, we can search for the target value in a sorted search
        space.
    - question: What is the time complexity of the optimal solution?
      options:
        - O(x)
        - O(sqrt(x))
        - O(log x)
        - O(1)
      correct: 2
      hint: Consider how many times the search space is halved in each step.
  solution:
    explanation: >
      We use binary search on the range [1, x]. To avoid overflow during the square calculation, use long for the mid
      variable.
    pseudocode: |
      low = 1, high = x
      while low <= high:
        mid = low + (high - low) / 2
        if mid * mid == x: return mid
        else if mid * mid < x: low = mid + 1
        else: high = mid - 1
      return high
    java: |
      public int mySqrt(int x) {
          if (x < 2) return x;
          long low = 1, high = x;
          while (low <= high) {
              long mid = low + (high - low) / 2;
              if (mid * mid == x) return (int) mid;
              if (mid * mid < x) low = mid + 1;
              else high = mid - 1;
          }
          return (int) high;
      }
