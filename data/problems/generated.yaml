  quiz:
    - question: What is the most efficient approach to solve this problem?
      options:
        - Convert to integers, add, then convert back to binary string
        - Use a two-pointer approach starting from the end of both strings
        - Reverse both strings and use a hash map to store bit pairs
        - Convert to char arrays and use recursion to simulate carry
      correct: 1
      hint: Consider how you perform manual addition on paper, moving from right to left.
    - question: What is the time complexity of the optimal solution?
      options:
        - O(log(N + M))
        - O(N * M)
        - O(max(N, M))
        - O(N + M + log(N + M))
      correct: 2
      hint: You must visit each character of the longer string exactly once.
  solution:
    explanation: >
      Use two pointers starting at the end of each string. Iterate backwards, keeping track of a carry value, and
      prepend the result to a StringBuilder.
    pseudocode: |
      i = a.len - 1, j = b.len - 1, carry = 0
      while i >= 0 or j >= 0 or carry:
        sum = carry + (i >= 0 ? a[i--] - '0' : 0) + (j >= 0 ? b[j--] - '0' : 0)
        res.append(sum % 2), carry = sum / 2
      return res.reverse().toString()
    java: |
      public String addBinary(String a, String b) {
          StringBuilder sb = new StringBuilder();
          int i = a.length() - 1, j = b.length() - 1, carry = 0;
          while (i >= 0 || j >= 0 || carry > 0) {
              int sum = carry + (i >= 0 ? a.charAt(i--) - '0' : 0) + (j >= 0 ? b.charAt(j--) - '0' : 0);
              sb.append(sum % 2);
              carry = sum / 2;
          }
          return sb.reverse().toString();
      }
