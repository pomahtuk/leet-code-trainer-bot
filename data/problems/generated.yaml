  statement: >
    Given two strings word1 and word2, return the minimum number of operations required to convert word1 to word2. You
    have three operations permitted: Insert a character, Delete a character, Replace a character.
  quiz:
    - question: Which algorithmic pattern is most suitable for solving the Edit Distance problem efficiently?
      options:
        - Dynamic Programming
        - Greedy Algorithm
        - Two Pointers
        - Breadth-First Search
      correct: 0
      hint: The problem involves finding an optimal solution by breaking it down into overlapping subproblems (prefixes of
        strings).
    - question: If word1[i-1] != word2[j-1], what is the correct recurrence relation for dp[i][j]?
      options:
        - 1 + min(dp[i-1][j], dp[i][j-1], dp[i-1][j-1])
        - 1 + dp[i-1][j-1]
        - dp[i-1][j] + dp[i][j-1]
        - min(dp[i-1][j], dp[i][j-1])
      correct: 0
      hint: "You must consider the cost of three possible operations: deletion, insertion, and replacement."
  solution:
    explanation: >
      We use a 2D DP table where dp[i][j] represents the minimum operations to convert word1[0...i-1] to
      word2[0...j-1].  If characters match, no new operation is needed (dp[i-1][j-1]); otherwise, we take the minimum of
      the three possible operations plus one.
    pseudocode: |
      Initialize dp[m+1][n+1]
      For i from 0 to m: dp[i][0] = i (deletions)
      For j from 0 to n: dp[0][j] = j (insertions)
      For i from 1 to m:
        For j from 1 to n:
          If word1[i-1] == word2[j-1]: dp[i][j] = dp[i-1][j-1]
          Else: dp[i][j] = 1 + min(dp[i-1][j], dp[i][j-1], dp[i-1][j-1])
      Return dp[m][n]
    java: |
      public int minDistance(String word1, String word2) {
          int m = word1.length(), n = word2.length();
          int[][] dp = new int[m + 1][n + 1];
          for (int i = 0; i <= m; i++) dp[i][0] = i;
          for (int j = 0; j <= n; j++) dp[0][j] = j;
          for (int i = 1; i <= m; i++) {
              for (int j = 1; j <= n; j++) {
                  if (word1.charAt(i - 1) == word2.charAt(j - 1)) dp[i][j] = dp[i - 1][j - 1];
                  else dp[i][j] = 1 + Math.min(dp[i - 1][j - 1], Math.min(dp[i - 1][j], dp[i][j - 1]));
              }
          }
          return dp[m][n];
      }
