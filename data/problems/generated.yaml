      hint: We only need to traverse the list once to find its length and once more to find the new tail.
  solution:
    explanation: >
      Calculate the list length to handle k > n using k % n. Form a ring by connecting the tail to the head, then
      traverse to the new tail (n - (k % n) - 1) and break the circle.
    pseudocode: |
      1. Find length n and tail node.
      2. k = k % n; if k == 0 return head.
      3. Connect tail to head.
      4. Move to (n - k - 1)-th node.
      5. New head is next, break link.
    java: |
      public ListNode rotateRight(ListNode head, int k) {
          if (head == null || head.next == null || k == 0) return head;
          ListNode tail = head;
          int n = 1;
          while (tail.next != null && ++n > 0) tail = tail.next;
          k %= n;
          if (k == 0) return head;
          tail.next = head;
          for (int i = 0; i < n - k; i++) tail = tail.next;
          head = tail.next;
          tail.next = null;
          return head;
      }
