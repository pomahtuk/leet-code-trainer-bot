  statement: >
    Given the root of a binary tree, return the level order traversal of its nodes&#39; values. (i.e., from left to
    right, level by level).

    Example 1: Input: root = [3,9,20,null,null,15,7] Output: [[3],[9,20],[15,7]]

    Constraints: The number of nodes in the tree is in the range [0, 2000]. -1000 <= Node.val <= 1000
  quiz:
    - question: Which data structure is most appropriate for implementing level-order traversal efficiently?
      options:
        - A Queue (FIFO)
        - A Stack (LIFO)
        - A Priority Queue
        - A Hash Map
      correct: 0
      hint: We need to process nodes in the order they were discovered to maintain level sequence.
    - question: How can you distinguish between different levels while using a single queue?
      options:
        - By inserting a null delimiter after every node
        - By capturing the queue's size at the beginning of each level's iteration
        - By checking if the node is a left child or a right child
        - By using two separate stacks
      correct: 1
      hint: The number of elements currently in the queue represents all nodes of the current level.
  solution:
    explanation: >
      Use a Breadth-First Search (BFS) approach with a queue. For each level, record the current queue size, then
      iterate that many times to extract all nodes of that level before adding their children for the next level.
    pseudocode: |
      if root is null: return []
      queue = [root], result = []
      while queue is not empty:
        level_size = queue.length, current_level = []
        for i from 0 to level_size - 1:
          node = queue.shift()
          current_level.push(node.val)
          if node.left: queue.push(node.left)
          if node.right: queue.push(node.right)
        result.push(current_level)
      return result
    java: |
      public List<List<Integer>> levelOrder(TreeNode root) {
          List<List<Integer>> res = new ArrayList<>();
          if (root == null) return res;
          Queue<TreeNode> q = new LinkedList<>();
          q.offer(root);
          while (!q.isEmpty()) {
              int size = q.size();
              List<Integer> level = new ArrayList<>();
              for (int i = 0; i < size; i++) {
                  TreeNode curr = q.poll();
                  level.add(curr.val);
                  if (curr.left != null) q.offer(curr.left);
                  if (curr.right != null) q.offer(curr.right);
              }
              res.add(level);
          }
          return res;
      }
