  statement: >
    You are given an integer array height of length n. Find two lines that together with the x-axis form a container,
    such that the container contains the most water. Return the maximum amount of water a container can store.
  quiz:
    - question: Which algorithm pattern is most efficient for solving this problem?
      options:
        - Two-pointer approach moving inward
        - Sliding window with fixed size
        - Dynamic programming with O(n^2) state
        - Binary search on the result space
      correct: 0
      hint: Consider how moving the pointer pointing to the shorter line affects the potential area.
    - question: What is the time complexity of the optimal solution?
      options:
        - O(n log n)
        - O(n^2)
        - O(n)
        - O(1)
      correct: 2
      hint: The pointers start at both ends and meet in the middle, visiting each element at most once.
  solution:
    explanation: >
      Use two pointers starting at both ends. At each step, calculate the area formed by the pointers, update the
      maximum, and move the pointer pointing to the shorter line inward to potentially find a taller line.
    pseudocode: |
      left = 0, right = n - 1, max_area = 0
      while left < right:
        area = min(h[left], h[right]) * (right - left)
        max_area = max(max_area, area)
        if h[left] < h[right]: left++ else: right--
      return max_area
    java: |
      public int maxArea(int[] height) {
          int l = 0, r = height.length - 1, max = 0;
          while (l < r) {
              max = Math.max(max, Math.min(height[l], height[r]) * (r - l));
              if (height[l] < height[r]) l++;
              else r--;
          }
          return max;
      }
