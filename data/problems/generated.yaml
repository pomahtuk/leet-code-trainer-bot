    - question: What is the most efficient approach to solve this problem?
      options:
        - Sort intervals by start time and iterate through once.
        - Use a Hash Map to store interval start points.
        - Nested loops to compare every pair of intervals.
        - Use a Fenwick tree to track interval endpoints.
      correct: 0
      hint: Sorting allows you to process intervals in a linear sequence where overlaps can only occur with the previous
        merged interval.
    - question: What is the overall time complexity of the optimal solution?
      options:
        - O(n)
        - O(n log n)
        - O(n^2)
        - O(log n)
      correct: 1
      hint: Sorting the input array dominates the time complexity.
  solution:
    explanation: >
      Sort the intervals by start time. Iterate through the sorted list, maintaining a 'current' interval; if the next
      interval's start is within the current end, merge them by updating the end; otherwise, add the current interval to
      the result.
    pseudocode: |
      Sort(intervals by start)
      result = []
      for interval in intervals:
        if result is empty or interval.start > result.last.end:
          result.push(interval)
        else:
          result.last.end = max(result.last.end, interval.end)
      return result
    java: |
      public int[][] merge(int[][] intervals) {
          Arrays.sort(intervals, (a, b) -> Integer.compare(a[0], b[0]));
          List<int[]> res = new ArrayList<>();
          for (int[] curr : intervals) {
              if (res.isEmpty() || curr[0] > res.get(res.size() - 1)[1]) res.add(curr);
              else res.get(res.size() - 1)[1] = Math.max(res.get(res.size() - 1)[1], curr[1]);
          }
          return res.toArray(new int[res.size()][]);
      }
