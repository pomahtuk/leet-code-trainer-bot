      correct: 1
      hint: Each step reduces the power n by half.
  solution:
    explanation: >
      The optimal approach is binary exponentiation, which reduces the problem size by half at each step. By squaring
      the base and halving the exponent, we achieve logarithmic time complexity.
    pseudocode: |
      function pow(x, n):
        if n == 0: return 1
        if n < 0: x = 1/x, n = -n
        res = pow(x, n/2)
        return n is even ? res * res : x * res * res
    java: |
      public double myPow(double x, int n) {
          long N = n;
          if (N < 0) { x = 1 / x; N = -N; }
          double ans = 1, current = x;
          while (N > 0) {
              if (N % 2 == 1) ans *= current;
              current *= current;
              N /= 2;
          }
          return ans;
      }
