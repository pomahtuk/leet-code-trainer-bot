  statement: >
    Given an integer array nums, return all the triplets [nums[i], nums[j], nums[k]] such that i != j, i != k, and j !=
    k, and nums[i] + nums[j] + nums[k] == 0. The solution set must not contain duplicate triplets.
  quiz:
    - question: What is the most efficient algorithmic approach for 3Sum?
      options:
        - Sort the array and use two pointers for the remaining sum
        - Use a triple nested loop to check all combinations
        - Use a hash map to store all pairs and check for the third value
        - Use a greedy approach by picking the largest and smallest elements
      correct: 0
      hint: Sorting helps skip duplicates and allows narrowing the search space linearly.
    - question: What is the optimal time complexity of the 3Sum algorithm?
      options:
        - O(n)
        - O(n log n)
        - O(n^2)
        - O(n^3)
      correct: 2
      hint: After sorting, the problem reduces to a nested loop where the inner part is O(n).
  solution:
    explanation: >
      Sort the array to handle duplicates easily and enable the two-pointer technique. Iterate through the array with
      one pointer and use two other pointers to find pairs that sum to the negative of the current element.
    pseudocode: |
      sort(nums)
      for i from 0 to n-3:
        if i > 0 and nums[i] == nums[i-1]: continue
        left, right = i + 1, n - 1
        while left < right:
          sum = nums[i] + nums[left] + nums[right]
          if sum == 0: add triplet, skip duplicates
          else if sum < 0: left++
          else: right--
    java: |
      public List<List<Integer>> threeSum(int[] nums) {
          Arrays.sort(nums);
          List<List<Integer>> res = new ArrayList<>();
          for (int i = 0; i < nums.length - 2; i++) {
              if (i > 0 && nums[i] == nums[i - 1]) continue;
              int l = i + 1, r = nums.length - 1;
              while (l < r) {
                  int s = nums[i] + nums[l] + nums[r];
                  if (s == 0) {
                      res.add(Arrays.asList(nums[i], nums[l++], nums[r--]));
                      while (l < r && nums[l] == nums[l - 1]) l++;
                  } else if (s < 0) l++; else r--;
              }
          }
          return res;
      }
