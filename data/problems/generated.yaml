  statement: |
    Given a string s, find the length of the longest substring without duplicate characters.
  quiz:
    - question: What is the optimal algorithmic pattern to solve this problem efficiently?
      options:
        - Sliding Window with a Hash Map
        - Dynamic Programming with 2D array
        - Brute force recursion with memoization
        - Binary Search on the answer length
      correct: 0
      hint: Think about maintaining a window [left, right] and moving the left pointer when a duplicate is found.
    - question: What are the time and space complexities of the optimal solution?
      options:
        - O(n^2) time, O(1) space
        - O(n) time, O(min(n, m)) space where m is charset size
        - O(n log n) time, O(n) space
        - O(n) time, O(n) space
      correct: 1
      hint: We traverse the string once, and store character indices in a map of size at most the character set.
  solution:
    explanation: >
      Use a sliding window defined by two pointers. Maintain a map of character positions; if a character repeats, move
      the left pointer to the right of its last occurrence.
    pseudocode: |
      left = 0, max_len = 0, map = {}
      for right in range(len(s)):
        if s[right] in map:
          left = max(left, map[s[right]] + 1)
        map[s[right]] = right
        max_len = max(max_len, right - left + 1)
      return max_len
    java: |
      public int lengthOfLongestSubstring(String s) {
        int[] map = new int[128];
        int maxLen = 0, left = 0;
        for (int right = 0; right < s.length(); right++) {
          left = Math.max(left, map[s.charAt(right)]);
          maxLen = Math.max(maxLen, right - left + 1);
          map[s.charAt(right)] = right + 1;
        }
        return maxLen;
      }
