  statement: >
    You are given an m x n integer array grid. A robot at (0,0) wants to reach (m-1, n-1) by moving only down or right.
    Obstacles are marked as 1 and empty spaces as 0. Paths cannot pass through obstacles. Return the total number of
    unique paths.
  quiz:
    - question: Which approach provides the optimal balance of time and space complexity?
      options:
        - Dynamic Programming with a 1D state array
        - Brute-force Depth First Search (DFS)
        - Greedy algorithm choosing the path with fewer obstacles
        - Breadth-First Search (BFS) storing all possible full paths
      correct: 0
      hint: The current cell depends only on the cell above it and the cell to its left.
    - question: What is the time complexity of the DP solution for an M x N grid?
      options:
        - O(M * N)
        - O(M + N)
        - O(2^(M + N))
        - O(log(M * N))
      correct: 0
      hint: Every cell in the grid is visited exactly once.
    - question: If grid[0][0] is 1, what is the expected output?
      options:
        - "0"
        - "1"
        - m * n
        - "null"
      correct: 0
      hint: If the starting point is blocked, no paths can exist.
  solution:
    explanation: >
      We use DP where dp[j] stores the paths to the current cell in column j. For each cell, if it's an obstacle, dp[j]
      = 0. Otherwise, we add the paths from the left (dp[j-1]) to the paths from above (current dp[j]).
    pseudocode: |
      n = grid[0].length, dp = array of size n (init 0)
      dp[0] = 1 if grid[0][0] is 0
      for row in grid:
        for j from 0 to n-1:
          if row[j] == 1: dp[j] = 0
          else if j > 0: dp[j] += dp[j-1]
      return dp[n-1]
    java: |
      public int uniquePathsWithObstacles(int[][] grid) {
          int n = grid[0].length;
          int[] dp = new int[n];
          dp[0] = 1;
          for (int[] row : grid) {
              for (int j = 0; j < n; j++) {
                  if (row[j] == 1) dp[j] = 0;
                  else if (j > 0) dp[j] += dp[j - 1];
              }
          }
          return dp[n - 1];
      }
