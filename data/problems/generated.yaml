  statement: >
    Given two integers dividend and divisor, divide two integers without using multiplication, division, and mod
    operator. Truncate toward zero. Handle 32-bit signed integer overflow by clamping to [-2^31, 2^31 - 1].
  quiz:
    - question: What is the most efficient approach to divide without using multiplication or division?
      options:
        - Bitwise left shifts to subtract multiples of the divisor.
        - Recursive subtraction of the divisor until the remainder is smaller.
        - Converting integers to strings and using long division.
        - Using a hash map to store precomputed products.
      correct: 0
      hint: Think about how binary representation allows for exponential growth of values.
    - question: What is the primary edge case regarding 32-bit signed integer limits?
      options:
        - Dividend is 0.
        - Divisor is 1.
        - Dividend is -2^31 and divisor is -1.
        - Dividend is -2^31 and divisor is 1.
      correct: 2
      hint: What happens when you negate the minimum 32-bit integer?
  solution:
    explanation: >
      We use bit-shifting (doubling the divisor) to subtract large chunks of the dividend efficiently.  This achieves
      logarithmic time complexity relative to the dividend. We must handle the overflow case where -2^31 divided by -1
      results in 2^31, which exceeds the max 32-bit integer.
    pseudocode: |
      if overflow: return INT_MAX
      sign = (dividend < 0) ^ (divisor < 0)
      abs_dvd, abs_dvs = abs(dividend), abs(divisor)
      result = 0
      while abs_dvd >= abs_dvs:
        temp, multiple = abs_dvs, 1
        while abs_dvd >= (temp << 1):
          temp <<= 1
          multiple <<= 1
        abs_dvd -= temp
        result += multiple
      return sign ? -result : result
    java: |
      public int divide(int dividend, int divisor) {
          if (dividend == Integer.MIN_VALUE && divisor == -1) return Integer.MAX_VALUE;
          boolean neg = (dividend < 0) ^ (divisor < 0);
          long dvd = Math.abs((long) dividend), dvs = Math.abs((long) divisor), res = 0;
          while (dvd >= dvs) {
              long temp = dvs, multiple = 1;
              while (dvd >= (temp << 1)) { temp <<= 1; multiple <<= 1; }
              dvd -= temp; res += multiple;
          }
          return neg ? (int) -res : (int) res;
      }
