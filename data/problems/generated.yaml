      private void backtrack(int start, int[] nums, List<Integer> curr, List<List<Integer>> res) {
          res.add(new ArrayList<>(curr));
          for (int i = start; i < nums.length; i++) {
              curr.add(nums[i]);
              backtrack(i + 1, nums, curr, res);
              curr.remove(curr.size() - 1);
          }
      }
