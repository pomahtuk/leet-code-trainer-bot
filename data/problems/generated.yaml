  statement: |
    Given a string s, return the longest palindromic substring in s.
  quiz:
    - question: Which approach provides the most efficient space-time complexity for finding the longest palindromic substring?
      options:
        - Expand Around Center (Two Pointers)
        - Brute force checking all substrings
        - Dynamic Programming table
        - Recursive approach with memoization
      correct: 0
      hint: Consider how you can grow a palindrome from its center without storing a full N x N matrix.
    - question: What are the time and space complexities of the Expand Around Center approach?
      options:
        - O(N^2) time and O(N^2) space
        - O(N^2) time and O(1) space
        - O(N log N) time and O(1) space
        - O(N) time and O(N) space
      correct: 1
      hint: Expanding from each of the 2N-1 centers takes linear time, and no extra data structure is needed.
  solution:
    explanation: >
      The optimal approach is to expand around each possible center (each character and the gap between characters).
      This avoids the O(N^2) space requirement of dynamic programming while maintaining O(N^2) time.
    pseudocode: |
      for i from 0 to s.length:
        expand(s, i, i) // odd length
        expand(s, i, i+1) // even length
      return longest
    java: |
      String longest = "";
      for (int i = 0; i < s.length(); i++) {
          for (int[] p : new int[][]{{i, i}, {i, i + 1}}) {
              int l = p[0], r = p[1];
              while (l >= 0 && r < s.length() && s.charAt(l) == s.charAt(r)) {
                  if (r - l + 1 > longest.length()) longest = s.substring(l, r + 1);
                  l--; r++;
              }
          }
      }
      return longest;
