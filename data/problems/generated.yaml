  solution:
    explanation: >
      Split the path by '/' and iterate through components. Use a stack to push directory names, ignore '.' or empty
      strings, and pop from the stack when '..' is encountered (if not empty).
    pseudocode: |
      stack = []
      for part in path.split('/'):
        if part == '..': stack.pop() if stack not empty
        else if part != '.' and part != '': stack.push(part)
