      options:
        - O(m * n)
        - O(m + n)
        - O(1)
        - O(min(m, n))
      correct: 3
      hint: You only need the previous row (or column) to calculate the current values.
  solution:
    explanation: >
      The number of paths to any cell (i, j) is the sum of paths to (i-1, j) and (i, j-1). We can optimize space to
      O(min(m, n)) by using a 1D array to track the current row's path counts.
    pseudocode: |
      dp = array of size n filled with 1s
      for i from 1 to m-1:
        for j from 1 to n-1:
          dp[j] = dp[j] + dp[j-1]
      return dp[n-1]
    java: |
      public int uniquePaths(int m, int n) {
          int[] dp = new int[n];
          java.util.Arrays.fill(dp, 1);
          for (int i = 1; i < m; i++) {
              for (int j = 1; j < n; j++) {
                  dp[j] += dp[j - 1];
              }
          }
          return dp[n - 1];
      }
