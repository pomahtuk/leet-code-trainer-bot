      options:
        - Reverse the entire integer using modulo and division, then compare it to the original.
        - Use a two-pointer approach by converting the integer to an array of digits.
        - Use recursion to compare digits from the outside in.
        - Use bit manipulation to swap bits until the number is mirrored.
