  quiz:
    - question: Which algorithmic pattern is most effective for generating all structural variations of a BST?
      options:
        - Recursive Divide and Conquer
        - Greedy Selection
        - Sliding Window
        - Breadth-First Search
      correct: 0
      hint: To build a tree, you pick a root and then independently form all possible left and right subtrees.
    - question: What is the time complexity related to the number of unique BSTs generated for n nodes?
      options:
        - Exponential (Catalan Number)
        - O(n^3)
        - O(n log n)
        - O(2^n)
      correct: 0
      hint: The number of trees grows according to the formula G(n) = sum of G(i-1)*G(n-i).
    - question: When the range [start, end] is invalid (start > end), what should the recursive function return?
      options:
        - A list containing null
        - An empty list
        - "null"
        - A list containing a node with value 0
      correct: 0
      hint: Each parent node must be able to iterate through its children lists, even if a child is null.
  solution:
    explanation: >
      The problem is solved using recursion. For a range [start, end], we pick every i as the root, then recursively
      generate all possible left subtrees from [start, i-1] and right subtrees from [i+1, end], combining them into
      unique trees.
    pseudocode: |
      function generate(start, end):
        if start > end: return [null]
        all_trees = []
        for i from start to end:
          left_subtrees = generate(start, i - 1)
          right_subtrees = generate(i + 1, end)
          for l in left_subtrees:
            for r in right_subtrees:
              root = TreeNode(i, l, r)
              all_trees.add(root)
        return all_trees
    java: |
      public List<TreeNode> generateTrees(int n) {
          if (n == 0) return new ArrayList<>();
          return build(1, n);
      }
      private List<TreeNode> build(int s, int e) {
          List<TreeNode> res = new ArrayList<>();
          if (s > e) { res.add(null); return res; }
          for (int i = s; i <= e; i++) {
              List<TreeNode> left = build(s, i - 1);
              List<TreeNode> right = build(i + 1, e);
              for (TreeNode l : left)
                  for (TreeNode r : right)
                      res.add(new TreeNode(i, l, r));
          }
          return res;
      }
