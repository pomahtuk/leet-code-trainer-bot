  quiz:
    - question: Which preprocessing step is essential to efficiently handle duplicates in this backtracking problem?
      options:
        - Sort the input array to group identical elements together.
        - Convert the array into a Frequency Map.
        - Shuffle the array to ensure randomness.
        - Remove all duplicates using a Set before processing.
      correct: 0
      hint: To skip the same element at the same recursion level, identical values must be adjacent.
    - question: In the backtracking loop, what condition correctly skips duplicate subsets?
      options:
        - if (i > start && nums[i] == nums[i-1]) continue;
        - if (nums[i] == nums[start]) continue;
        - if (i > 0 && nums[i] == nums[i-1]) continue;
        - if (path.contains(nums[i])) continue;
      correct: 0
      hint: The condition must check if the current element is a duplicate of the previous element within the same recursive
        depth.
    - question: What is the time complexity of the backtracking approach for this problem?
      options:
        - O(n * 2^n)
        - O(2^n)
        - O(n^2)
        - O(n!)
      correct: 0
      hint: There are 2^n possible subsets, and copying each subset into the result list takes linear time.
  solution:
    explanation: >
      First, sort the array to handle duplicates. Use backtracking to explore all combinations. At each step, skip the
      current element if it's the same as the previous element in the current loop (i > start), ensuring we only pick
      the first occurrence of a duplicate for a specific position in the subset.
    pseudocode: |
      sort(nums)
      backtrack(start, path):
        add copy of path to results
        for i from start to nums.length - 1:
          if i > start and nums[i] == nums[i-1]: continue
          path.add(nums[i])
          backtrack(i + 1, path)
          path.pop()
    java: |
      public List<List<Integer>> subsetsWithDup(int[] nums) {
          Arrays.sort(nums);
          List<List<Integer>> res = new ArrayList<>();
          backtrack(res, new ArrayList<>(), nums, 0);
          return res;
      }
      private void backtrack(List<List<Integer>> res, List<Integer> temp, int[] nums, int start) {
          res.add(new ArrayList<>(temp));
          for (int i = start; i < nums.length; i++) {
              if (i > start && nums[i] == nums[i - 1]) continue;
              temp.add(nums[i]);
              backtrack(res, temp, nums, i + 1);
              temp.remove(temp.size() - 1);
          }
      }
