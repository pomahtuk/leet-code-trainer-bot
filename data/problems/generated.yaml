    - question: When using the three-pointer approach, what should you do when nums[mid] == 2?
      options:
        - Swap nums[mid] with nums[high] and decrement high
        - Swap nums[mid] with nums[low] and increment mid
        - Increment both mid and high pointers
        - Only decrement the high pointer
