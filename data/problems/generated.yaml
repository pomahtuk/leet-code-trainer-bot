  statement: >
    Given an array nums of distinct integers, return all the possible permutations. You can return the answer in any
    order.
  quiz:
    - question: What is the most efficient pattern to generate all permutations?
      options:
        - Backtracking with a visited array or swapping
        - Dynamic programming with memoization
        - Breadth-First Search
        - Two-pointer approach
      correct: 0
      hint: Consider how you can build the permutation incrementally and explore all choices.
    - question: What is the time complexity of generating all permutations of an array of length N?
      options:
        - O(N)
        - O(N^2)
        - O(N!)
        - O(2^N)
      correct: 2
      hint: "Think about how many choices you have at each step: N choices for the first, N-1 for the second, etc."
  solution:
    explanation: >
      We use backtracking to explore all possible orderings. By swapping elements at the current index with subsequent
      elements, we generate every unique permutation without needing extra space for a visited set.
    pseudocode: |
      function backtrack(first):
        if first == n: add current list to results
        for i from first to n-1:
          swap(nums[first], nums[i])
          backtrack(first + 1)
          swap(nums[first], nums[i])
    java: |
      public List<List<Integer>> permute(int[] nums) {
          List<List<Integer>> res = new ArrayList<>();
          backtrack(0, nums, res);
          return res;
      }
      void backtrack(int start, int[] nums, List<List<Integer>> res) {
          if (start == nums.length) {
              List<Integer> list = new ArrayList<>();
              for (int n : nums) list.add(n);
              res.add(list);
              return;
          }
          for (int i = start; i < nums.length; i++) {
              swap(nums, start, i);
              backtrack(start + 1, nums, res);
              swap(nums, start, i);
          }
      }
      void swap(int[] nums, int i, int j) {
          int temp = nums[i]; nums[i] = nums[j]; nums[j] = temp;
      }
