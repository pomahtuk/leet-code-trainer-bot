  statement: >
    You are given two non-empty linked lists representing two non-negative integers. The digits are stored in reverse
    order, and each of their nodes contains a single digit. Add the two numbers and return the sum as a linked list.
  quiz:
    - question: Which approach is most efficient for adding these linked lists?
      options:
        - Iterate through both lists simultaneously, maintaining a carry variable.
        - Convert lists to strings, reverse them, add as integers, then convert back.
        - Use recursion to reverse the lists first, then perform addition.
        - Use a nested loop to compare every node from l1 with every node from l2.
      correct: 0
      hint: Think about how manual addition works on paper, starting from the ones column.
    - question: What is the time complexity of this algorithm?
      options:
        - O(N * M)
        - O(N + M)
        - O(max(N, M))
        - O(N^2)
      correct: 2
      hint: The loop runs until the end of the longer linked list.
  solution:
    explanation: >
      Simulate elementary addition by traversing both lists and tracking a carry. Create a new node for each sum digit,
      handling cases where lists have different lengths or a final carry exists.
    pseudocode: |
      Initialize dummy node, current = dummy, carry = 0
      While l1 or l2 or carry:
        sum = carry + (l1.val if l1) + (l2.val if l2)
        carry = sum / 10
        current.next = Node(sum % 10)
        current = current.next
        advance l1 and l2 if they exist
      Return dummy.next
    java: |
      public ListNode addTwoNumbers(ListNode l1, ListNode l2) {
          ListNode dummy = new ListNode(0), curr = dummy;
          int carry = 0;
          while (l1 != null || l2 != null || carry != 0) {
              int sum = carry + (l1 != null ? l1.val : 0) + (l2 != null ? l2.val : 0);
              carry = sum / 10;
              curr.next = new ListNode(sum % 10);
              curr = curr.next;
              if (l1 != null) l1 = l1.next;
              if (l2 != null) l2 = l2.next;
          }
          return dummy.next;
      }
- id: 7
