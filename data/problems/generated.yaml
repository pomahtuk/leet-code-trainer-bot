    [1,null,2,3], Output: [1,3,2]. Example 2: Input: root = [1,2,3,4,5,null,8,null,null,6,7,9], Output:
    [4,2,6,5,7,1,3,9,8]. Constraints: The number of nodes is in the range [0, 100]. -100 <= Node.val <= 100.
  quiz:
    - question: Which data structure is most appropriate to implement an iterative inorder traversal?
      options:
        - Stack
        - Queue
        - Priority Queue
        - Hash Set
      correct: 0
      hint: Think about which structure mimics the Last-In-First-Out (LIFO) nature of recursion.
    - question: What is the correct processing order for an inorder traversal?
      options:
        - Root -> Left -> Right
        - Left -> Right -> Root
        - Left -> Root -> Right
        - Root -> Right -> Left
      correct: 2
      hint: The 'in' in 'inorder' refers to the root being visited in between the children.
    - question: In a skewed tree with N nodes, what is the worst-case space complexity of the traversal?
      options:
        - O(1)
        - O(log N)
        - O(N)
        - O(N log N)
      correct: 2
      hint: Consider the maximum depth of the stack when the tree is essentially a linked list.
  solution:
    explanation: >
      Iterative inorder traversal uses a stack to simulate the recursion stack. We push all left children to the stack,
      then pop a node to process its value, and finally move to its right child to repeat the process.
    pseudocode: |
      stack = [], curr = root, result = []
      while curr OR stack:
        while curr:
          stack.push(curr)
          curr = curr.left
        curr = stack.pop()
        result.add(curr.val)
        curr = curr.right
      return result
    java: |
      public List<Integer> inorderTraversal(TreeNode root) {
          List<Integer> res = new ArrayList<>();
          Stack<TreeNode> stack = new Stack<>();
          while (root != null || !stack.isEmpty()) {
              while (root != null) {
                  stack.push(root);
                  root = root.left;
              }
              root = stack.pop();
              res.add(root.val);
              root = root.right;
          }
          return res;
      }
