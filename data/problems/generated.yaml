  statement: >
    There is an integer array nums sorted in non-decreasing order (not necessarily with distinct values). The array is
    rotated at an unknown pivot. Given the rotated array and a target, return true if target is in nums, or false
    otherwise. Follow up: How do duplicates affect the runtime complexity?
  quiz:
    - question: What is the worst-case time complexity of this problem due to duplicates?
      options:
        - O(n)
        - O(log n)
        - O(n log n)
        - O(1)
      correct: 0
      hint: Think about an array like [1, 1, 1, 1, 1, 0, 1] where the target is 0.
    - question: How should the algorithm handle the case where nums[left] == nums[mid] == nums[right]?
      options:
        - Return true immediately
        - Perform a linear search on the whole array
        - Increment the left pointer and decrement the right pointer
        - Always search the left half
      correct: 2
      hint: When all three values are equal, you cannot determine which side is sorted.
  solution:
    explanation: >
      We use binary search but add a condition to handle duplicates. When `nums[left] == nums[mid] == nums[right]`,  we
      cannot determine which half is sorted, so we shrink the range from both ends. Otherwise, we  identify the sorted
      half and check if the target lies within it.
    pseudocode: |
      while left <= right:
        mid = left + (right - left) / 2
        if nums[mid] == target: return true
        if nums[left] == nums[mid] == nums[right]:
          left++; right--
        else if nums[left] <= nums[mid]:
          if nums[left] <= target < nums[mid]: right = mid - 1
          else: left = mid + 1
        else:
          if nums[mid] < target <= nums[right]: left = mid + 1
          else: right = mid - 1
      return false
    java: |
      public boolean search(int[] nums, int target) {
          int l = 0, r = nums.length - 1;
          while (l <= r) {
              int m = l + (r - l) / 2;
              if (nums[m] == target) return true;
              if (nums[l] == nums[m] && nums[r] == nums[m]) { l++; r--; }
              else if (nums[l] <= nums[m]) {
                  if (nums[l] <= target && target < nums[m]) r = m - 1;
                  else l = m + 1;
              } else {
                  if (nums[m] < target && target <= nums[r]) l = m + 1;
                  else r = m - 1;
              }
          }
          return false;
      }
