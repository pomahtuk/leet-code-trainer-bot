        - Copying the sub-segment to an array, reversing it, and writing it back.
        - Using a stack to store nodes from left to right, then popping them.
      correct: 0
      hint: You need to adjust pointers as you traverse the list once.
    - question: What is the time and space complexity of the optimal iterative solution?
      options:
        - O(N) time and O(1) space
        - O(N) time and O(N) space
        - O(right) time and O(right - left) space
        - O(N^2) time and O(1) space
      correct: 0
      hint: We visit each node at most once and only use a few auxiliary pointers.
  solution:
    explanation: >
      Use a dummy node to handle head changes. Traverse to the (left-1)-th node ('pre').  Then, for (right-left)
      iterations, move the node after 'curr' to the position immediately after 'pre'.
    pseudocode: |
      dummy = Node(0, head), pre = dummy
      repeat left-1 times: pre = pre.next
      curr = pre.next
      repeat right-left times:
        nxt = curr.next
        curr.next = nxt.next
        nxt.next = pre.next
        pre.next = nxt
      return dummy.next
    java: |
      public ListNode reverseBetween(ListNode head, int left, int right) {
          ListNode dummy = new ListNode(0, head), pre = dummy;
          for (int i = 0; i < left - 1; i++) pre = pre.next;
          ListNode curr = pre.next;
          for (int i = 0; i < right - left; i++) {
              ListNode nxt = curr.next;
              curr.next = nxt.next;
              nxt.next = pre.next;
              pre.next = nxt;
          }
          return dummy.next;
      }
