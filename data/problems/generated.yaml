  statement: >
    A valid IP address consists of exactly four integers separated by single dots. Each integer is between 0 and 255
    (inclusive) and cannot have leading zeros. Given a string s containing only digits, return all possible valid IP
    addresses that can be formed by inserting dots into s.
  quiz:
    - question: Which algorithmic strategy is most suitable for exploring all valid ways to partition the string into four
        segments?
      options:
        - Backtracking
        - Greedy approach
        - Sliding Window
        - Kahn's Algorithm
      correct: 0
      hint: You need to try different split points and undo choices if they lead to an invalid state.
    - question: Which of these conditions would make a segment invalid according to the problem rules?
      options:
        - The segment is '0'.
        - The segment is '01'.
        - The segment is '255'.
        - The segment is '1'.
      correct: 1
      hint: The problem states that integers cannot have leading zeros unless the integer itself is 0.
  solution:
    explanation: >
      Use backtracking to split the string into 4 segments. For each segment, ensure it is 1-3 digits long, its value is
      ≤ 255, and it doesn't have leading zeros (unless it's exactly "0").
    pseudocode: |
      function backtrack(start, path):
        if path.size == 4:
          if start == s.length: result.add(join(path, "."))
          return
        for len from 1 to 3:
          if start + len > s.length: break
          segment = s.substring(start, start + len)
          if isValid(segment):
            path.add(segment)
            backtrack(start + len, path)
            path.pop()
    java: |
      public List<String> restoreIpAddresses(String s) {
          List<String> res = new ArrayList<>();
          if (s.length() > 12) return res;
          backtrack(s, 0, new ArrayList<>(), res);
          return res;
      }
      private void backtrack(String s, int start, List<String> path, List<String> res) {
          if (path.size() == 4) {
              if (start == s.length()) res.add(String.join(".", path));
              return;
          }
          for (int i = 1; i <= 3 && start + i <= s.length(); i++) {
              String sub = s.substring(start, start + i);
              if ((sub.startsWith("0") && sub.length() > 1) || Integer.parseInt(sub) > 255) continue;
              path.add(sub);
              backtrack(s, start + i, path, res);
              path.remove(path.size() - 1);
          }
      }
