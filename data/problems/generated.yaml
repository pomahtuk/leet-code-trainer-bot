  quiz:
    - question: Which approach efficiently finds the next lexicographical permutation?
      options:
        - Find the first decreasing element from the right, swap with the smallest larger element to its right, then
          reverse the suffix.
        - Sort the entire array and return the next element in a precomputed list of all permutations.
        - Use a backtracking approach to generate all permutations and pick the one immediately following the input.
        - Iterate from left to right to find the first peak and swap it with the last element.
      correct: 0
      hint: Think about the properties of the suffix when a sequence is at its maximum lexicographical state.
    - question: What is the time complexity of the optimal in-place algorithm?
      options:
        - O(n log n)
        - O(n)
        - O(n^2)
        - O(1)
      correct: 1
      hint: You only need a few passes over the array to identify the pivot and reverse the suffix.
  solution:
    explanation: >
      Find the first pair from the right where nums[i] < nums[i+1]. If it exists, swap nums[i] with the smallest element
      to its right that is greater than nums[i], then reverse the suffix starting at i+1. If no such i exists, the array
      is in descending order, so reverse the whole array.
    pseudocode: |
      1. Find largest i such that nums[i] < nums[i+1]
      2. If i >= 0, find largest j > i such that nums[j] > nums[i], swap(i, j)
      3. Reverse the sub-array from i+1 to end
    java: |
      public void nextPermutation(int[] nums) {
          int i = nums.length - 2;
          while (i >= 0 && nums[i] >= nums[i + 1]) i--;
          if (i >= 0) {
              int j = nums.length - 1;
              while (nums[j] <= nums[i]) j--;
              swap(nums, i, j);
          }
          reverse(nums, i + 1, nums.length - 1);
      }
      void swap(int[] n, int i, int j) { int t = n[i]; n[i] = n[j]; n[j] = t; }
      void reverse(int[] n, int i, int j) { while (i < j) swap(n, i++, j--); }
