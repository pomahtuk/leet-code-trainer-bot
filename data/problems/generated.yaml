    java: |
      String simplifyPath(String path) {
          Deque<String> stack = new ArrayDeque<>();
          for (String dir : path.split("/")) {
              if (dir.equals("..")) stack.pollLast();
              else if (!dir.isEmpty() && !dir.equals(".")) stack.addLast(dir);
          }
          return "/" + String.join("/", stack);
      }
