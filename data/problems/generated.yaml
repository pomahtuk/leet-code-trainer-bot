        - O(log(m * n))
        - O(max(m, n)^2)
      correct: 0
      hint: How many times is each element in the matrix visited?
    - question: Why are conditional checks (e.g., if top <= bottom) necessary inside the main loop?
      options:
        - To prevent duplicate traversal of the same row/column in non-square matrices.
        - To handle matrices with negative integers.
        - To ensure the result list does not exceed the matrix size.
        - To reset the pointers when a corner is reached.
      correct: 0
      hint: Consider a single-row matrix; after moving left-to-right, the 'top' boundary moves down.
  solution:
    explanation: >
      Maintain four boundaries: top, bottom, left, and right. Traverse the top row, right column, bottom row, and left
      column in sequence, incrementing or decrementing the respective boundary after each step.
    pseudocode: |
      Initialize top=0, bottom=rows-1, left=0, right=cols-1
      While top <= bottom AND left <= right:
        For i from left to right: add matrix[top][i], increment top
        For i from top to bottom: add matrix[i][right], decrement right
        If top <= bottom:
          For i from right to left: add matrix[bottom][i], decrement bottom
        If left <= right:
          For i from bottom to top: add matrix[i][left], increment left
    java: |
      public List<Integer> spiralOrder(int[][] matrix) {
          List<Integer> res = new ArrayList<>();
          int top = 0, bottom = matrix.length - 1, left = 0, right = matrix[0].length - 1;
          while (top <= bottom && left <= right) {
              for (int j = left; j <= right; j++) res.add(matrix[top][j]);
              top++;
              for (int i = top; i <= bottom; i++) res.add(matrix[i][right]);
              right--;
              if (top <= bottom)
                  for (int j = right; j >= left; j--) res.add(matrix[bottom][j]);
              bottom--;
              if (left <= right)
                  for (int i = bottom; i >= top; i--) res.add(matrix[i][left]);
              left++;
          }
          return res;
      }
