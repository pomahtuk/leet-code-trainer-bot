    - question: What is the optimal space complexity for this problem if you only track the last two states?
      options:
        - O(n^2)
        - O(1)
        - O(n)
        - O(log n)
      correct: 1
      hint: To calculate the current number of ways, you only need the results from the previous one and two characters.
    - question: How should the algorithm handle a '0' character at the very beginning of the string?
      options:
        - Return 0 immediately
        - Ignore it and move to the next digit
        - Treat it as a valid 'A' mapping
        - Subtract 1 from the total count
      correct: 0
      hint: A leading zero cannot be mapped to any letter according to the '1'-'26' rule.
  solution:
    explanation: >
      We use DP where dp[i] is the number of ways to decode the prefix of length i. Ways are added from dp[i-1] if
      s[i-1] is '1'-'9', and from dp[i-2] if s[i-2...i-1] is '10'-'26'.
    pseudocode: |
      dp[0] = 1
      dp[1] = s[0] == '0' ? 0 : 1
      for i from 2 to s.length:
        if s[i-1] != '0': dp[i] += dp[i-1]
        two_digit = int(s[i-2...i-1])
        if 10 <= two_digit <= 26: dp[i] += dp[i-2]
      return dp[n]
    java: |
      public int numDecodings(String s) {
          int n = s.length();
          int[] dp = new int[n + 1];
          dp[0] = 1;
          dp[1] = s.charAt(0) == '0' ? 0 : 1;
          for (int i = 2; i <= n; i++) {
              if (s.charAt(i - 1) != '0') dp[i] += dp[i - 1];
              int two = Integer.parseInt(s.substring(i - 2, i));
              if (two >= 10 && two <= 26) dp[i] += dp[i - 2];
          }
          return dp[n];
      }
