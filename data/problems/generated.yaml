  quiz:
    - question: Which algorithmic pattern is most suitable for generating all possible combinations of size k?
      options:
        - Backtracking
        - Greedy
        - Sliding Window
        - Divide and Conquer
      correct: 0
      hint: The problem asks to explore all valid subsets of a specific size, building them step-by-step.
    - question: What is the time complexity of the standard backtracking solution for this problem?
      options:
        - O(k * C(n, k))
        - O(2^n)
        - O(n^k)
        - O(n!)
      correct: 0
      hint: Think about the total number of combinations multiplied by the time to copy each path.
  solution:
    explanation: >
      Use recursion to build combinations. For each number from 'start' to 'n', add it to the current path and recurse
      with 'i + 1'. When the path length reaches 'k', add a copy to the result.
    pseudocode: |
      backtrack(start, path):
        if path.size == k:
          result.add(copy(path)); return
        for i from start to n:
          path.add(i)
          backtrack(i + 1, path)
          path.removeLast()
    java: |
      public List<List<Integer>> combine(int n, int k) {
          List<List<Integer>> res = new ArrayList<>();
          backtrack(1, n, k, new ArrayList<>(), res);
          return res;
      }
      private void backtrack(int start, int n, int k, List<Integer> path, List<List<Integer>> res) {
          if (path.size() == k) {
              res.add(new ArrayList<>(path));
              return;
          }
          for (int i = start; i <= n - (k - path.size()) + 1; i++) {
              path.add(i);
              backtrack(i + 1, n, k, path, res);
              path.remove(path.size() - 1);
          }
      }
