  statement: >
    Implement the myAtoi(string s) function, which converts a string to a 32-bit signed integer. Follow rules for
    whitespace, sign determination, digit conversion, and 32-bit overflow clamping.
  quiz:
    - question: What is the most efficient approach to solve this problem?
      options:
        - Single pass iteration with state tracking
        - Regular expression parsing
        - Two-pointer approach
        - String splitting by non-digits
      correct: 0
      hint: Think about processing the string character by character while maintaining a running total and sign.
    - question: How should you handle potential 32-bit signed integer overflow during calculation?
      options:
        - Use a double to store the result and cast at the end
        - Check if current result exceeds (MAX_INT - digit) / 10 before multiplying
        - Use a BigInteger to store the result
        - Check for overflow only after the loop completes
      correct: 1
      hint: Multiplying by 10 then adding a digit can overflow before you even store it in a variable.
  solution:
    explanation: >
      Process the string in one pass: skip whitespace, determine the sign, and accumulate digits.  Check for overflow by
      comparing the current result against Integer.MAX_VALUE boundaries before updating.
    pseudocode: |
      skip spaces; get sign;
      while char is digit:
        if result > limit: return clamped value
        result = result * 10 + digit
      return result * sign
    java: |
      public int myAtoi(String s) {
          int i = 0, n = s.length(), sign = 1, res = 0;
          while (i < n && s.charAt(i) == ' ') i++;
          if (i < n && (s.charAt(i) == '+' || s.charAt(i) == '-')) 
              sign = s.charAt(i++) == '-' ? -1 : 1;
          while (i < n && Character.isDigit(s.charAt(i))) {
              int digit = s.charAt(i++) - '0';
              if (res > (Integer.MAX_VALUE - digit) / 10) 
                  return sign == 1 ? Integer.MAX_VALUE : Integer.MIN_VALUE;
              res = res * 10 + digit;
          }
          return res * sign;
      }
