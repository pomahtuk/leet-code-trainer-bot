  statement: >
    Given a m x n grid filled with non-negative numbers, find a path from top left to bottom right, which minimizes the
    sum of all numbers along its path. Note: You can only move either down or right at any point in time.
  quiz:
    - question: Which approach is most efficient to solve this problem?
      options:
        - Dynamic Programming
        - Breadth-First Search
        - Greedy Algorithm
        - Backtracking with pruning
      correct: 0
      hint: Think about overlapping subproblems where the current minimum depends on the results of previously visited cells.
    - question: What is the optimal space complexity if we modify the grid in-place?
      options:
        - O(m*n)
        - O(m+n)
        - O(1)
        - O(max(m, n))
      correct: 2
      hint: If you are allowed to overwrite the input matrix, you don't need extra storage for the DP table.
  solution:
    explanation: >
      This problem can be solved using dynamic programming by updating each cell with the minimum path sum reaching it.
      Since you can only arrive from the top or the left, the min sum for cell (i, j) is grid[i][j] + min(grid[i-1][j],
      grid[i][j-1]).
    pseudocode: |
      For i from 0 to m-1:
        For j from 0 to n-1:
          If i>0 and j>0: grid[i][j] += min(grid[i-1][j], grid[i][j-1])
          Else if i>0: grid[i][j] += grid[i-1][j]
          Else if j>0: grid[i][j] += grid[i][j-1]
      Return grid[m-1][n-1]
    java: |
      public int minPathSum(int[][] grid) {
          int m = grid.length, n = grid[0].length;
          for (int i = 0; i < m; i++) {
              for (int j = 0; j < n; j++) {
                  if (i == 0 && j > 0) grid[i][j] += grid[i][j - 1];
                  else if (j == 0 && i > 0) grid[i][j] += grid[i - 1][j];
                  else if (i > 0 && j > 0) grid[i][j] += Math.min(grid[i - 1][j], grid[i][j - 1]);
              }
          }
          return grid[m - 1][n - 1];
      }
