  solution:
    explanation: >
      Negative numbers are never palindromes due to the minus sign. For positive numbers, reverse the second half of the
      digits mathematically and compare it to the first half to avoid potential integer overflow.
    pseudocode: |
      if x < 0 or (x % 10 == 0 and x != 0): return false
      reversedHalf = 0
      while x > reversedHalf:
        reversedHalf = reversedHalf * 10 + x % 10
        x /= 10
      return x == reversedHalf or x == reversedHalf / 10
    java: |
      public boolean isPalindrome(int x) {
          if (x < 0 || (x % 10 == 0 && x != 0)) return false;
          int reverted = 0;
          while (x > reverted) {
              reverted = reverted * 10 + x % 10;
              x /= 10;
          }
          return x == reverted || x == reverted / 10;
      }
