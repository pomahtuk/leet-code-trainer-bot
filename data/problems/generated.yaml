    - question: In the O(1) space solution, why is a separate variable (like col0) often necessary?
      options:
        - Because cell matrix[0][0] is shared by the first row and first column
        - To store the sum of the matrix to verify the result
        - To handle matrices that contain only negative numbers
        - To track the total number of zeroes found in the matrix
      correct: 0
      hint: Consider the overlap between the marker for the first row and the marker for the first column.
    - question: What is the time complexity of the optimal in-place solution?
      options:
        - O(M * N)
        - O(M + N)
        - O(M^2 * N^2)
