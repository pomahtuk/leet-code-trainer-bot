      correct: 0
      hint: You must visit every element at least once to check for zeroes.
  solution:
    explanation: >
      We use the first row and first column as markers to indicate if a specific row or column should be zeroed. Since
      matrix[0][0] overlaps both, we use an extra variable 'col0' to track the first column's status separately and
      iterate backwards when applying markers to avoid overwriting state.
    pseudocode: |
      col0 = false, R = matrix.length, C = matrix[0].length
      for i from 0 to R-1:
        if matrix[i][0] == 0: col0 = true
        for j from 1 to C-1:
          if matrix[i][j] == 0: matrix[i][0] = matrix[0][j] = 0
      for i from R-1 down to 0:
        for j from C-1 down to 1:
          if matrix[i][0] == 0 or matrix[0][j] == 0: matrix[i][j] = 0
        if col0: matrix[i][0] = 0
    java: |
      public void setZeroes(int[][] matrix) {
          int R = matrix.length, C = matrix[0].length;
          boolean col0 = false;
          for (int i = 0; i < R; i++) {
              if (matrix[i][0] == 0) col0 = true;
              for (int j = 1; j < C; j++)
                  if (matrix[i][j] == 0) matrix[i][0] = matrix[0][j] = 0;
          }
          for (int i = R - 1; i >= 0; i--) {
              for (int j = C - 1; j >= 1; j--)
                  if (matrix[i][0] == 0 || matrix[0][j] == 0) matrix[i][j] = 0;
              if (col0) matrix[i][0] = 0;
          }
      }
