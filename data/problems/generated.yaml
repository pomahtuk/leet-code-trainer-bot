  quiz:
    - question: Which approach is most efficient for incrementing the array?
      options:
        - Convert array to a long integer, add one, convert back to array.
        - Iterate from right to left, handling carries and resizing if all digits are 9.
        - Reverse the array, add one at index 0, then reverse back.
        - Use recursion to add one to the last element.
      correct: 1
      hint: Consider what happens when you encounter a 9 (e.g., 199 + 1 = 200).
    - question: What is the time complexity of the optimal solution?
      options:
        - O(1)
        - O(log N)
        - O(N)
        - O(N^2)
      correct: 2
      hint: In the worst case, you might traverse all digits once.
  solution:
    explanation: >
      Iterate from the last digit backwards. If the digit is less than 9, increment it and return. If it is 9, set it to
      0 and continue to the next position. If the loop finishes, it means all digits were 9, so create a new array with
      a leading 1.
    pseudocode: |
      for i from last to 0:
        if digits[i] < 9:
          digits[i] += 1
          return digits
        digits[i] = 0
      new_arr = [1] + digits
      return new_arr
    java: |
      public int[] plusOne(int[] digits) {
          for (int i = digits.length - 1; i >= 0; i--) {
              if (digits[i] < 9) {
                  digits[i]++;
                  return digits;
              }
              digits[i] = 0;
          }
          int[] res = new int[digits.length + 1];
          res[0] = 1;
          return res;
      }
