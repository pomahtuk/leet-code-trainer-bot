    Given an m x n grid of characters board and a string word, return true if word exists in the grid. The word can be
    constructed from letters of sequentially adjacent cells (horizontal or vertical). The same letter cell may not be
    used more than once.
  quiz:
    - question: Which algorithmic strategy is most appropriate for exploring all possible paths to find the word?
      options:
        - DFS with Backtracking
        - BFS using a Queue
        - Dynamic Programming with Memoization
        - Greedy Search
      correct: 0
      hint: We need to explore a path and, if it fails, 'undo' our progress to try a different direction.
    - question: What is the worst-case time complexity of the backtracking solution (M=rows, N=cols, L=word length)?
      options:
        - O(M * N * 3^L)
        - O(M * N * L)
        - O(M * N * 4 * L)
        - O((M * N)^L)
      correct: 0
      hint: From each starting cell, we branch into 3-4 directions for each character in the word.
  solution:
    explanation: >
      Iterate through every cell in the matrix as a potential starting point. Use DFS to explore adjacent
      cells,  temporarily marking the current cell as visited (e.g., using a special character) to prevent reuse,  then
      backtrack by restoring the original character.
    pseudocode: |
      function exist(board, word):
        for r, c in board:
          if backtrack(r, c, 0): return true
        return false
      function backtrack(r, c, i):
        if i == word.length: return true
        if out_of_bounds OR board[r][c] != word[i]: return false
        temp, board[r][c] = board[r][c], '#'
        found = backtrack(r+1, c, i+1) OR backtrack(r-1, c, i+1) OR ...
        board[r][c] = temp
        return found
    java: |
      public boolean exist(char[][] board, String word) {
          for (int i = 0; i < board.length; i++)
              for (int j = 0; j < board[0].length; j++)
                  if (dfs(board, word, i, j, 0)) return true;
          return false;
      }
      private boolean dfs(char[][] b, String w, int r, int c, int k) {
          if (k == w.length()) return true;
          if (r < 0 || r >= b.length || c < 0 || c >= b[0].length || b[r][c] != w.charAt(k)) return false;
          char tmp = b[r][c];
          b[r][c] = '\0';
          boolean ok = dfs(b,w,r+1,c,k+1) || dfs(b,w,r-1,c,k+1) || dfs(b,w,r,c+1,k+1) || dfs(b,w,r,c-1,k+1);
          b[r][c] = tmp;
          return ok;
      }
