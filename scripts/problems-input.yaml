  slug: minimum-number-of-vertices-to-reach-all-nodes
  difficulty: medium
  topics:
    - graph
  companies:
    - airbnb
    - amazon
    - google
    - meta
    - microsoft
  statement: >-
    Given a directed acyclic graph, with n vertices numbered from 0 to n-1, and an array edges where edges[i] = [fromi,
    toi] represents a directed edge from node fromi to node toi.


    Find the smallest set of vertices from which all nodes in the graph are reachable. It&#39;s guaranteed that a unique
    solution exists.


    Notice that you can return the vertices in any order.

     
    Example 1:


    Input: n = 6, edges = [[0,1],[0,2],[2,5],[3,4],[4,2]]

    Output: [0,3]

    Explanation: It&#39;s not possible to reach all the nodes from a single vertex. From 0 we can reach [0,1,2,5]. From
    3 we can reach [3,4,2,5]. So we output [0,3].


    Example 2:


    Input: n = 5, edges = [[0,1],[2,1],[3,1],[1,4],[2,4]]

    Output: [0,2,3]

    Explanation: Notice that vertices 0, 3 and 2 are not reachable from any other node, so we must include them. Also
    any of these vertices can reach nodes 1 and 4.

     
    Constraints:

    	2 <= n <= 10^5
    	1 <= edges.length <= min(10^5, n * (n - 1) / 2)
    	edges[i].length == 2
    	0 <= fromi, toi < n
    	All pairs (fromi, toi) are distinct.
- leetcode_id: 1558
  title: Minimum Numbers of Function Calls to Make Target Array
  slug: minimum-numbers-of-function-calls-to-make-target-array
  difficulty: medium
  topics:
    - array
    - greedy
    - bit-manipulation
  companies:
    - amazon
  statement: >-
    You are given an integer array nums. You have an integer array arr of the same length with all values set to 0
    initially. You also have the following modify function:


    You want to use the modify function to convert arr to nums using the minimum number of calls.


    Return the minimum number of function calls to make nums from arr.


    The test cases are generated so that the answer fits in a 32-bit signed integer.

     
    Example 1:


    Input: nums = [1,5]

    Output: 5

    Explanation: Increment by 1 (second element): [0, 0] to get [0, 1] (1 operation).

    Double all the elements: [0, 1] -> [0, 2] -> [0, 4] (2 operations).

    Increment by 1 (both elements)  [0, 4] -> [1, 4] -> [1, 5] (2 operations).

    Total of operations: 1 + 2 + 2 = 5.


    Example 2:


    Input: nums = [2,2]

    Output: 3

    Explanation: Increment by 1 (both elements) [0, 0] -> [0, 1] -> [1, 1] (2 operations).

    Double all the elements: [1, 1] -> [2, 2] (1 operation).

    Total of operations: 2 + 1 = 3.


    Example 3:


    Input: nums = [4,2,5]

    Output: 6

    Explanation: (initial)[0,0,0] -> [1,0,0] -> [1,0,1] -> [2,0,2] -> [2,1,2] -> [4,2,4] -> [4,2,5](nums).

     
    Constraints:

    	1 <= nums.length <= 105
    	0 <= nums[i] <= 109
