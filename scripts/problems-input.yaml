    | 6            | 2        | Charger      | 100      | 25.99  |

    | 7            | 2        | Case         | 75       | 15.99  |

    | 8            | 2        | Headphones   | 20       | 149.99 |

    | 9            | 3        | Tablet       | 2        | 499.99 |

    | 10           | 3        | Stylus       | 80       | 29.99  |

    | 11           | 3        | Cover        | 60       | 39.99  |

