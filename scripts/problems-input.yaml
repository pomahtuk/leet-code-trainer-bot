    The &#39;start&#39; timestamp will always be before the &#39;end&#39; timestamp for every (machine_id, process_id)
    pair.

    It is guaranteed that each (machine_id, process_id) pair has a &#39;start&#39; and &#39;end&#39; timestamp.

     

