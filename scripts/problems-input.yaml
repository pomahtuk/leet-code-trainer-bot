    | 0          | 1          | end           | 4.120     |

    | 1          | 0          | start         | 0.550     |

    | 1          | 0          | end           | 1.550     |

    | 1          | 1          | start         | 0.430     |

    | 1          | 1          | end           | 1.420     |

