    m - 1, you can move to any of the cells (x + 1, 0), (x + 1, 1), ..., (x + 1, n - 1). Note that it is not possible to
    move from cells in the last row.


    Each possible move has a cost given by a 0-indexed 2D array moveCost of size (m * n) x n, where moveCost[i][j] is
    the cost of moving from a cell with value i to a cell in column j of the next row. The cost of moving from cells in
    the last row of grid can be ignored.


