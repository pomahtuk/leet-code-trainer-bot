    On the second turn, ans[1] += 2, and the array is [1,2,0,0].

    On the third turn, ans[2] += 3, and the array is [1,2,3,0].

    On the fourth turn, ans[3] += 1 (because there is only one candy left), and the final array is [1,2,3,1].


