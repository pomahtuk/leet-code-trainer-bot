    unlocked using it or another previously unlocked computer, following this information:

    	You can decrypt the password for the computer i using the password for computer j, where j is any integer less than i with a lower complexity. (i.e. j < i and complexity[j] < complexity[i])
    	To decrypt the password for computer i, you must have already unlocked a computer j such that j < i and complexity[j] < complexity[i].

    Find the number of permutations of [0, 1, 2, ..., (n - 1)] that represent a valid order in which the computers can
    be unlocked, starting from computer 0 as the only initially unlocked one.


    Since the answer may be large, return it modulo 109 + 7.


