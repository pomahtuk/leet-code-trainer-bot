  statement: >-
    There are 3n piles of coins of varying size, you and your friends will take piles of coins as follows:

    	In each step, you will choose any 3 piles of coins (not necessarily consecutive).
    	Of your choice, Alice will pick the pile with the maximum number of coins.
    	You will pick the next pile with the maximum number of coins.
    	Your friend Bob will pick the last pile.
    	Repeat until there are no more piles of coins.

    Given an array of integers piles where piles[i] is the number of coins in the ith pile.


    Return the maximum number of coins that you can have.

     
    Example 1:


    Input: piles = [2,4,1,2,7,8]

    Output: 9

    Explanation: Choose the triplet (2, 7, 8), Alice Pick the pile with 8 coins, you the pile with 7 coins and Bob the
    last one.

    Choose the triplet (1, 2, 4), Alice Pick the pile with 4 coins, you the pile with 2 coins and Bob the last one.

    The maximum number of coins which you can have are: 7 + 2 = 9.

    On the other hand if we choose this arrangement (1, 2, 8), (2, 4, 7) you only get 2 + 4 = 6 coins which is not
    optimal.


    Example 2:


    Input: piles = [2,4,5]

    Output: 4


    Example 3:


    Input: piles = [9,8,7,6,5,1,2,3,4]

    Output: 18

     
    Constraints:

    	3 <= piles.length <= 105
    	piles.length % 3 == 0
    	1 <= piles[i] <= 104
- leetcode_id: 1562
  title: Find Latest Group of Size M
  slug: find-latest-group-of-size-m
  difficulty: medium
  topics:
    - array
    - hash-table
    - binary-search
    - simulation
  companies:
    - google
  statement: >-
    Given an array arr that represents a permutation of numbers from 1 to n.


    You have a binary string of size n that initially has all its bits set to zero. At each step i (assuming both the
    binary string and arr are 1-indexed) from 1 to n, the bit at position arr[i] is set to 1.


    You are also given an integer m. Find the latest step at which there exists a group of ones of length m. A group of
    ones is a contiguous substring of 1&#39;s such that it cannot be extended in either direction.


    Return the latest step at which there exists a group of ones of length exactly m. If no such group exists, return
    -1.

     
    Example 1:


    Input: arr = [3,5,1,2,4], m = 1

    Output: 4

    Explanation: 

    Step 1: "00100", groups: ["1"]

    Step 2: "00101", groups: ["1", "1"]

    Step 3: "10101", groups: ["1", "1", "1"]

    Step 4: "11101", groups: ["111", "1"]

    Step 5: "11111", groups: ["11111"]

    The latest step at which there exists a group of size 1 is step 4.


    Example 2:


    Input: arr = [3,1,5,4,2], m = 2

    Output: -1

    Explanation: 

    Step 1: "00100", groups: ["1"]

    Step 2: "10100", groups: ["1", "1"]

    Step 3: "10101", groups: ["1", "1", "1"]

    Step 4: "10111", groups: ["1", "111"]

    Step 5: "11111", groups: ["11111"]

    No group of size 2 exists during any step.

     
    Constraints:

    	n == arr.length
    	1 <= m <= n <= 105
    	1 <= arr[i] <= n
    	All integers in arr are distinct.
