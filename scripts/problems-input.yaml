    &#39;A&#39;.


    Now it&#39;s Bob&#39;s turn.

    Bob cannot make a move on his turn since there are no &#39;B&#39;s whose neighbors are both &#39;B&#39;.

    Thus, Alice wins, so return true.


    Example 2:


    Input: colors = "AA"

    Output: false

    Explanation:

    Alice has her turn first.

