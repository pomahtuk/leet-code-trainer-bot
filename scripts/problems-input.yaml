- leetcode_id: 3602
  title: Hexadecimal and Hexatrigesimal Conversion
  slug: hexadecimal-and-hexatrigesimal-conversion
  difficulty: easy
  topics:
    - math
    - string
  companies:
    - zopsmart
  statement: >-
    You are given an integer n.


    Return the concatenation of the hexadecimal representation of n2 and the hexatrigesimal representation of n3.


    A hexadecimal number is defined as a base-16 numeral system that uses the digits 0 &ndash; 9 and the uppercase
    letters A - F to represent values from 0 to 15.


    A hexatrigesimal number is defined as a base-36 numeral system that uses the digits 0 &ndash; 9 and the uppercase
    letters A - Z to represent values from 0 to 35.

     
    Example 1:


    Input: n = 13


    Output: "A91P1"


    Explanation:

    	n2 = 13 * 13 = 169. In hexadecimal, it converts to (10 * 16) + 9 = 169, which corresponds to "A9".
    	n3 = 13 * 13 * 13 = 2197. In hexatrigesimal, it converts to (1 * 362) + (25 * 36) + 1 = 2197, which corresponds to "1P1".
    	Concatenating both results gives "A9" + "1P1" = "A91P1".

    Example 2:


    Input: n = 36


    Output: "5101000"


    Explanation:

    	n2 = 36 * 36 = 1296. In hexadecimal, it converts to (5 * 162) + (1 * 16) + 0 = 1296, which corresponds to "510".
    	n3 = 36 * 36 * 36 = 46656. In hexatrigesimal, it converts to (1 * 363) + (0 * 362) + (0 * 36) + 0 = 46656, which corresponds to "1000".
    	Concatenating both results gives "510" + "1000" = "5101000".



     
    Constraints:

    	1 <= n <= 1000
- leetcode_id: 3603
  title: Minimum Cost Path with Alternating Directions II
  slug: minimum-cost-path-with-alternating-directions-ii
  difficulty: medium
  topics:
    - array
    - dynamic-programming
    - matrix
  companies: []
  statement: |-
    You are given two integers m and n representing the number of rows and columns of a grid, respectively.

    The cost to enter cell (i, j) is defined as (i + 1) * (j + 1).

    You are also given a 2D integer array waitCost where waitCost[i][j] defines the cost to wait on that cell.

    The path will always begin by entering cell (0, 0) on move 1 and paying the entrance cost.

    At each step, you follow an alternating pattern:

    	On odd-numbered seconds, you must move right or down to an adjacent cell, paying its entry cost.
    	On even-numbered seconds, you must wait in place for exactly one second and pay waitCost[i][j] during that second.

    Return the minimum total cost required to reach (m - 1, n - 1).

     
    Example 1:

    Input: m = 1, n = 2, waitCost = [[1,2]]

    Output: 3

    Explanation:

    The optimal path is:

    	Start at cell (0, 0) at second 1 with entry cost (0 + 1) * (0 + 1) = 1.
    	Second 1: Move right to cell (0, 1) with entry cost (0 + 1) * (1 + 1) = 2.

    Thus, the total cost is 1 + 2 = 3.

    Example 2:

    Input: m = 2, n = 2, waitCost = [[3,5],[2,4]]

    Output: 9

    Explanation:

    The optimal path is:

    	Start at cell (0, 0) at second 1 with entry cost (0 + 1) * (0 + 1) = 1.
    	Second 1: Move down to cell (1, 0) with entry cost (1 + 1) * (0 + 1) = 2.
    	Second 2: Wait at cell (1, 0), paying waitCost[1][0] = 2.
    	Second 3: Move right to cell (1, 1) with entry cost (1 + 1) * (1 + 1) = 4.

    Thus, the total cost is 1 + 2 + 2 + 4 = 9.

    Example 3:

    Input: m = 2, n = 3, waitCost = [[6,1,4],[3,2,5]]

    Output: 16

    Explanation:

    The optimal path is:

    	Start at cell (0, 0) at second 1 with entry cost (0 + 1) * (0 + 1) = 1.
    	Second 1: Move right to cell (0, 1) with entry cost (0 + 1) * (1 + 1) = 2.
    	Second 2: Wait at cell (0, 1), paying waitCost[0][1] = 1.
    	Second 3: Move down to cell (1, 1) with entry cost (1 + 1) * (1 + 1) = 4.
    	Second 4: Wait at cell (1, 1), paying waitCost[1][1] = 2.
    	Second 5: Move right to cell (1, 2) with entry cost (1 + 1) * (2 + 1) = 6.

    Thus, the total cost is 1 + 2 + 1 + 4 + 2 + 6 = 16.

     
    Constraints:

    	1 <= m, n <= 105
    	2 <= m * n <= 105
    	waitCost.length == m
    	waitCost[0].length == n
    	0 <= waitCost[i][j] <= 105
- leetcode_id: 3604
  title: Minimum Time to Reach Destination in Directed Graph
  slug: minimum-time-to-reach-destination-in-directed-graph
  difficulty: medium
  topics:
    - graph
    - heap-priority-queue
    - shortest-path
  companies: []
  statement: >-
    You are given an integer n and a directed graph with n nodes labeled from 0 to n - 1. This is represented by a 2D
    array edges, where edges[i] = [ui, vi, starti, endi] indicates an edge from node ui to vi that can only be used at
    any integer time t such that starti <= t <= endi.


    You start at node 0 at time 0.


    In one unit of time, you can either:

    	Wait at your current node without moving, or
    	Travel along an outgoing edge from your current node if the current time t satisfies starti <= t <= endi.

    Return the minimum time required to reach node n - 1. If it is impossible, return -1.

     
    Example 1:


    Input: n = 3, edges = [[0,1,0,1],[1,2,2,5]]


    Output: 3


    Explanation:


    The optimal path is:

    	At time t = 0, take the edge (0 &rarr; 1) which is available from 0 to 1. You arrive at node 1 at time t = 1, then wait until t = 2.
    	At time t = 2, take the edge (1 &rarr; 2) which is available from 2 to 5. You arrive at node 2 at time 3.

    Hence, the minimum time to reach node 2 is 3.


    Example 2:


    Input: n = 4, edges = [[0,1,0,3],[1,3,7,8],[0,2,1,5],[2,3,4,7]]


    Output: 5


    Explanation:


    The optimal path is:

    	Wait at node 0 until time t = 1, then take the edge (0 &rarr; 2) which is available from 1 to 5. You arrive at node 2 at t = 2.
    	Wait at node 2 until time t = 4, then take the edge (2 &rarr; 3) which is available from 4 to 7. You arrive at node 3 at t = 5.

    Hence, the minimum time to reach node 3 is 5.


    Example 3:


    Input: n = 3, edges = [[1,0,1,3],[1,2,3,5]]


    Output: -1


    Explanation:

    	Since there is no outgoing edge from node 0, it is impossible to reach node 2. Hence, the output is -1.



     
    Constraints:

    	1 <= n <= 105
    	0 <= edges.length <= 105
    	edges[i] == [ui, vi, starti, endi]
    	0 <= ui, vi <= n - 1
    	ui != vi
    	0 <= starti <= endi <= 109
