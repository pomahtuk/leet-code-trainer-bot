  companies: []
  statement: >-
    You are given a string s consisting of lowercase English letters and an integer k.


    Two equal characters in the current string s are considered close if the distance between their indices is at most
    k.


    When two characters are close, the right one merges into the left. Merges happen one at a time, and after each
    merge, the string updates until no more merges are possible.


    Return the resulting string after performing all possible merges.


    Note: If multiple merges are possible, always merge the pair with the smallest left index. If multiple pairs share
    the smallest left index, choose the pair with the smallest right index.

     
    Example 1:


    Input: s = "abca", k = 3


    Output: "abc"


    Explanation:

    	​​​​​​​Characters &#39;a&#39; at indices i = 0 and i = 3 are close as 3 - 0 = 3 <= k.
    	Merge them into the left &#39;a&#39; and s = "abc".
    	No other equal characters are close, so no further merges occur.

    Example 2:


    Input: s = "aabca", k = 2


    Output: "abca"


    Explanation:

    	Characters &#39;a&#39; at indices i = 0 and i = 1 are close as 1 - 0 = 1 <= k.
    	Merge them into the left &#39;a&#39; and s = "abca".
    	Now the remaining &#39;a&#39; characters at indices i = 0 and i = 3 are not close as k < 3, so no further merges occur.

    Example 3:


    Input: s = "yybyzybz", k = 2


    Output: "ybzybz"


    Explanation:

    	Characters &#39;y&#39; at indices i = 0 and i = 1 are close as 1 - 0 = 1 <= k.
    	Merge them into the left &#39;y&#39; and s = "ybyzybz".
    	Now the characters &#39;y&#39; at indices i = 0 and i = 2 are close as 2 - 0 = 2 <= k.
    	Merge them into the left &#39;y&#39; and s = "ybzybz".
    	No other equal characters are close, so no further merges occur.



     
    Constraints:

    	1 <= s.length <= 100
    	1 <= k <= s.length
    	s consists of lowercase English letters.
- leetcode_id: 3854
  title: Minimum Operations to Make Array Parity Alternating
  slug: minimum-operations-to-make-array-parity-alternating
  difficulty: medium
  topics: []
  companies: []
  statement: >-
    You are given an integer array nums.


    An array is called parity alternating if for every index i where 0 <= i < n - 1, nums[i] and nums[i + 1] have
    different parity (one is even and the other is odd).


    In one operation, you may choose any index i and either increase nums[i] by 1 or decrease nums[i] by 1.


    Return an integer array answer of length 2 where:

    	answer[0] is the minimum number of operations required to make the array parity alternating.
    	answer[1] is the minimum possible value of max(nums) - min(nums) taken over all arrays that are parity alternating and can be obtained by performing exactly answer[0] operations.

    An array of length 1 is considered parity alternating.

     
    Example 1:


    Input: nums = [-2,-3,1,4]


    Output: [2,6]


    Explanation:


    Applying the following operations:

    	Increase nums[2] by 1, resulting in nums = [-2, -3, 2, 4].
    	Decrease nums[3] by 1, resulting in nums = [-2, -3, 2, 3].

    The resulting array is parity alternating, and the value of max(nums) - min(nums) = 3 - (-3) = 6 is the minimum
    possible among all parity alternating arrays obtainable using exactly 2 operations.


    Example 2:


    Input: nums = [0,2,-2]


    Output: [1,3]


    Explanation:


    Applying the following operation:

    	Decrease nums[1] by 1, resulting in nums = [0, 1, -2].

    The resulting array is parity alternating, and the value of max(nums) - min(nums) = 1 - (-2) = 3 is the minimum
    possible among all parity alternating arrays obtainable using exactly 1 operation.


    Example 3:


    Input: nums = [7]


    Output: [0,0]


    Explanation:


    No operations are required. The array is already parity alternating, and the value of max(nums) - min(nums) = 7 - 7
    = 0, which is the minimum possible.

     
    Constraints:

    	1 <= nums.length <= 105
    	-109 <= nums[i] <= 109
