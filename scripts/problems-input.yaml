    cost of changing the array to [3,3,3,3,3] using 4 special moves is given by |1 - 3| + |2 - 3| + |4 - 3| + |5 - 3| =
    6.

    It can be shown that changing all elements to any palindromic number other than 3 cannot be achieved at a lower
    cost.


    Example 2:


