    	(i, j, k) = (0, 1, 3)

    	
    		nums[0] = 8, nums[1] = 4, nums[3] = 8
    		nums[0] = nums[1] * 2 = 4 * 2 = 8
    		nums[3] = nums[1] * 2 = 4 * 2 = 8
    	
    	
