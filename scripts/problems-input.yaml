  slug: find-the-winning-player-in-coin-game
  difficulty: easy
  topics:
    - math
    - simulation
    - game-theory
  companies:
    - bloomberg
  statement: >-
    You are given two positive integers x and y, denoting the number of coins with values 75 and 10 respectively.


    Alice and Bob are playing a game. Each turn, starting with Alice, the player must pick up coins with a total value
    115. If the player is unable to do so, they lose the game.


    Return the name of the player who wins the game if both players play optimally.

     
    Example 1:


    Input: x = 2, y = 7


    Output: "Alice"


    Explanation:


    The game ends in a single turn:

    	Alice picks 1 coin with a value of 75 and 4 coins with a value of 10.

    Example 2:


    Input: x = 4, y = 11


    Output: "Bob"


    Explanation:


    The game ends in 2 turns:

    	Alice picks 1 coin with a value of 75 and 4 coins with a value of 10.
    	Bob picks 1 coin with a value of 75 and 4 coins with a value of 10.



     
    Constraints:

    	1 <= x, y <= 100
- leetcode_id: 3223
  title: Minimum Length of String After Operations
  slug: minimum-length-of-string-after-operations
  difficulty: medium
  topics:
    - hash-table
    - string
    - counting
  companies:
    - amazon
    - bloomberg
    - ibm
  statement: >-
    You are given a string s.


    You can perform the following process on s any number of times:

    	Choose an index i in the string such that there is at least one character to the left of index i that is equal to s[i], and at least one character to the right that is also equal to s[i].
    	Delete the closest occurrence of s[i] located to the left of i.
    	Delete the closest occurrence of s[i] located to the right of i.

    Return the minimum length of the final string s that you can achieve.

     
    Example 1:


    Input: s = "abaacbcbb"


    Output: 5


    Explanation:

    We do the following operations:

    	Choose index 2, then remove the characters at indices 0 and 3. The resulting string is s = "bacbcbb".
    	Choose index 3, then remove the characters at indices 0 and 5. The resulting string is s = "acbcb".

    Example 2:


    Input: s = "aa"


    Output: 2


    Explanation:

    We cannot perform any operations, so we return the length of the original string.

     
    Constraints:

    	1 <= s.length <= 2 * 105
    	s consists only of lowercase English letters.
- leetcode_id: 3224
  title: Minimum Array Changes to Make Differences Equal
  slug: minimum-array-changes-to-make-differences-equal
  difficulty: medium
  topics:
    - array
    - hash-table
    - prefix-sum
  companies:
    - airbus
    - google
  statement: >-
    You are given an integer array nums of size n where n is even, and an integer k.


    You can perform some changes on the array, where in one change you can replace any element in the array with any
    integer in the range from 0 to k.


    You need to perform some changes (possibly none) such that the final array satisfies the following condition:

    	There exists an integer X such that abs(a[i] - a[n - i - 1]) = X for all (0 <= i < n).

    Return the minimum number of changes required to satisfy the above condition.

     
    Example 1:


    Input: nums = [1,0,1,2,4,3], k = 4


    Output: 2


    Explanation:

    We can perform the following changes:

    	Replace nums[1] by 2. The resulting array is nums = [1,2,1,2,4,3].
    	Replace nums[3] by 3. The resulting array is nums = [1,2,1,3,4,3].

    The integer X will be 2.


    Example 2:


    Input: nums = [0,1,2,3,3,6,5,4], k = 6


    Output: 2


    Explanation:

    We can perform the following operations:

    	Replace nums[3] by 0. The resulting array is nums = [0,1,2,0,3,6,5,4].
    	Replace nums[4] by 4. The resulting array is nums = [0,1,2,0,4,6,5,4].

    The integer X will be 4.

     
    Constraints:

    	2 <= n == nums.length <= 105
    	n is even.
    	0 <= nums[i] <= k <= 105
- leetcode_id: 3226
  title: Number of Bit Changes to Make Two Integers Equal
  slug: number-of-bit-changes-to-make-two-integers-equal
  difficulty: easy
  topics:
    - bit-manipulation
  companies:
    - thoughtworks
  statement: |-
    You are given two positive integers n and k.

    You can choose any bit in the binary representation of n that is equal to 1 and change it to 0.

    Return the number of changes needed to make n equal to k. If it is impossible, return -1.

     
    Example 1:

    Input: n = 13, k = 4

    Output: 2

    Explanation:
    Initially, the binary representations of n and k are n = (1101)2 and k = (0100)2.
    We can change the first and fourth bits of n. The resulting integer is n = (0100)2 = k.

    Example 2:

    Input: n = 21, k = 21

    Output: 0

    Explanation:
    n and k are already equal, so no changes are needed.

    Example 3:

    Input: n = 14, k = 13

    Output: -1

    Explanation:
    It is not possible to make n equal to k.

     
    Constraints:

    	1 <= n, k <= 106
