  statement: >-
    You are given a string array words and a binary array groups both of length n.


    A subsequence of words is alternating if for any two consecutive strings in the sequence, their corresponding
    elements at the same indices in groups are different (that is, there cannot be consecutive 0 or 1).


    Your task is to select the longest alternating subsequence from words.


    Return the selected subsequence. If there are multiple answers, return any of them.


    Note: The elements in words are distinct.

     
    Example 1:


    Input: words = ["e","a","b"], groups = [0,0,1]


    Output: ["e","b"]


    Explanation: A subsequence that can be selected is ["e","b"] because groups[0] != groups[2]. Another subsequence
    that can be selected is ["a","b"] because groups[1] != groups[2]. It can be demonstrated that the length of the
    longest subsequence of indices that satisfies the condition is 2.


    Example 2:


    Input: words = ["a","b","c","d"], groups = [1,0,1,1]


    Output: ["a","b","c"]


    Explanation: A subsequence that can be selected is ["a","b","c"] because groups[0] != groups[1] and groups[1] !=
    groups[2]. Another subsequence that can be selected is ["a","b","d"] because groups[0] != groups[1] and groups[1] !=
    groups[3]. It can be shown that the length of the longest subsequence of indices that satisfies the condition is 3.

     
    Constraints:

    	1 <= n == words.length == groups.length <= 100
    	1 <= words[i].length <= 10
    	groups[i] is either 0 or 1.
    	words consists of distinct strings.
    	words[i] consists of lowercase English letters.
- leetcode_id: 2901
  title: Longest Unequal Adjacent Groups Subsequence II
  slug: longest-unequal-adjacent-groups-subsequence-ii
  difficulty: medium
  topics:
    - array
    - string
    - dynamic-programming
  companies:
    - fourkites
    - meta
  statement: >-
    You are given a string array words, and an array groups, both arrays having length n.


    The hamming distance between two strings of equal length is the number of positions at which the corresponding
    characters are different.


    You need to select the longest subsequence from an array of indices [0, 1, ..., n - 1], such that for the
    subsequence denoted as [i0, i1, ..., ik-1] having length k, the following holds:

    	For adjacent indices in the subsequence, their corresponding groups are unequal, i.e., groups[ij] != groups[ij+1], for each j where 0 < j + 1 < k.
    	words[ij] and words[ij+1] are equal in length, and the hamming distance between them is 1, where 0 < j + 1 < k, for all indices in the subsequence.

    Return a string array containing the words corresponding to the indices (in order) in the selected subsequence. If
    there are multiple answers, return any of them.


    Note: strings in words may be unequal in length.

     
    Example 1:


    Input: words = ["bab","dab","cab"], groups = [1,2,2]


    Output: ["bab","cab"]


    Explanation: A subsequence that can be selected is [0,2].

    	groups[0] != groups[2]
    	words[0].length == words[2].length, and the hamming distance between them is 1.

    So, a valid answer is [words[0],words[2]] = ["bab","cab"].


    Another subsequence that can be selected is [0,1].

    	groups[0] != groups[1]
    	words[0].length == words[1].length, and the hamming distance between them is 1.

    So, another valid answer is [words[0],words[1]] = ["bab","dab"].


    It can be shown that the length of the longest subsequence of indices that satisfies the conditions is 2.


    Example 2:


    Input: words = ["a","b","c","d"], groups = [1,2,3,4]


    Output: ["a","b","c","d"]


    Explanation: We can select the subsequence [0,1,2,3].


    It satisfies both conditions.


    Hence, the answer is [words[0],words[1],words[2],words[3]] = ["a","b","c","d"].


    It has the longest length among all subsequences of indices that satisfy the conditions.


    Hence, it is the only answer.

     
    Constraints:

    	1 <= n == words.length == groups.length <= 1000
    	1 <= words[i].length <= 10
    	1 <= groups[i] <= n
    	words consists of distinct strings.
    	words[i] consists of lowercase English letters.
- leetcode_id: 2903
  title: Find Indices With Index and Value Difference I
