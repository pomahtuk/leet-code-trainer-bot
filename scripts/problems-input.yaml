  statement: >-
    Table: Visits


    +-------------+---------+

    | Column Name | Type    |

    +-------------+---------+

    | visit_id    | int     |

    | customer_id | int     |

    +-------------+---------+

    visit_id is the column with unique values for this table.

    This table contains information about the customers who visited the mall.

     

    Table: Transactions


    +----------------+---------+

    | Column Name    | Type    |

    +----------------+---------+

    | transaction_id | int     |

    | visit_id       | int     |

    | amount         | int     |

    +----------------+---------+

