    consonants (&#39;c&#39;, &#39;r&#39;).


    The score is floor(v / c) = floor(4 / 2) = 2.


    Example 2:


    Input: s = "axeyizou"


    Output: 1


    Explanation:


    The string s = "axeyizou" contains v = 5 vowels (&#39;a&#39;, &#39;e&#39;, &#39;i&#39;, &#39;o&#39;, &#39;u&#39;)
    and c = 3 consonants (&#39;x&#39;, &#39;y&#39;, &#39;z&#39;).


    The score is floor(v / c) = floor(5 / 3) = 1.


