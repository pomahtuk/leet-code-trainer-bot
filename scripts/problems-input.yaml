    - Water plant 3 (4 steps). Return to river (4 steps).

    - Water plant 4 (5 steps). Return to river (5 steps).

    - Water plant 5 (6 steps).

    Steps needed = 3 + 3 + 4 + 4 + 5 + 5 + 6 = 30.


    Example 3:


    Input: plants = [7,7,7,7,7,7,7], capacity = 8

    Output: 49

