- leetcode_id: 3567
  title: Minimum Absolute Difference in Sliding Submatrix
  slug: minimum-absolute-difference-in-sliding-submatrix
  difficulty: medium
  topics:
    - array
    - sorting
    - matrix
  companies: []
  statement: >-
    You are given an m x n integer matrix grid and an integer k.


    For every contiguous k x k submatrix of grid, compute the minimum absolute difference between any two distinct
    values within that submatrix.


    Return a 2D array ans of size (m - k + 1) x (n - k + 1), where ans[i][j] is the minimum absolute difference in the
    submatrix whose top-left corner is (i, j) in grid.


    Note: If all elements in the submatrix have the same value, the answer will be 0.

    A submatrix (x1, y1, x2, y2) is a matrix that is formed by choosing all cells matrix[x][y] where x1 <= x <= x2 and
    y1 <= y <= y2.
     
    Example 1:


    Input: grid = [[1,8],[3,-2]], k = 2


    Output: [[2]]


    Explanation:

    	There is only one possible k x k submatrix: [[1, 8], [3, -2]].
    	Distinct values in the submatrix are [1, 8, 3, -2].
    	The minimum absolute difference in the submatrix is |1 - 3| = 2. Thus, the answer is [[2]].

    Example 2:


    Input: grid = [[3,-1]], k = 1


    Output: [[0,0]]


    Explanation:

    	Both k x k submatrix has only one distinct element.
    	Thus, the answer is [[0, 0]].

    Example 3:


    Input: grid = [[1,-2,3],[2,3,5]], k = 2


    Output: [[1,2]]


    Explanation:

    	There are two possible k &times; k submatrix:

    	
    		Starting at (0, 0): [[1, -2], [2, 3]].

    		
    			Distinct values in the submatrix are [1, -2, 2, 3].
    			The minimum absolute difference in the submatrix is |1 - 2| = 1.
    		
    		
    		Starting at (0, 1): [[-2, 3], [3, 5]].
    		
    			Distinct values in the submatrix are [-2, 3, 5].
    			The minimum absolute difference in the submatrix is |3 - 5| = 2.
    		
    		
    	
    	
    	Thus, the answer is [[1, 2]].



     
    Constraints:

    	1 <= m == grid.length <= 30
    	1 <= n == grid[i].length <= 30
    	-105 <= grid[i][j] <= 105
    	1 <= k <= min(m, n)
- leetcode_id: 3568
  title: Minimum Moves to Clean the Classroom
  slug: minimum-moves-to-clean-the-classroom
  difficulty: medium
  topics:
    - array
    - hash-table
    - bit-manipulation
    - breadth-first-search
    - matrix
  companies:
    - bloomberg
  statement: >-
    You are given an m x n grid classroom where a student volunteer is tasked with cleaning up litter scattered around
    the room. Each cell in the grid is one of the following:

    	&#39;S&#39;: Starting position of the student
    	&#39;L&#39;: Litter that must be collected (once collected, the cell becomes empty)
    	&#39;R&#39;: Reset area that restores the student&#39;s energy to full capacity, regardless of their current energy level (can be used multiple times)
    	&#39;X&#39;: Obstacle the student cannot pass through
    	&#39;.&#39;: Empty space

    You are also given an integer energy, representing the student&#39;s maximum energy capacity. The student starts
    with this energy from the starting position &#39;S&#39;.


    Each move to an adjacent cell (up, down, left, or right) costs 1 unit of energy. If the energy reaches 0, the
    student can only continue if they are on a reset area &#39;R&#39;, which resets the energy to its maximum capacity
    energy.


    Return the minimum number of moves required to collect all litter items, or -1 if it&#39;s impossible.

     
    Example 1:


    Input: classroom = ["S.", "XL"], energy = 2


    Output: 2


    Explanation:

    	The student starts at cell (0, 0) with 2 units of energy.
    	Since cell (1, 0) contains an obstacle &#39;X&#39;, the student cannot move directly downward.
    	A valid sequence of moves to collect all litter is as follows:
    	
    		Move 1: From (0, 0) &rarr; (0, 1) with 1 unit of energy and 1 unit remaining.
    		Move 2: From (0, 1) &rarr; (1, 1) to collect the litter &#39;L&#39;.
    	
    	
    	The student collects all the litter using 2 moves. Thus, the output is 2.

    Example 2:


    Input: classroom = ["LS", "RL"], energy = 4


    Output: 3


    Explanation:

    	The student starts at cell (0, 1) with 4 units of energy.
    	A valid sequence of moves to collect all litter is as follows:
    	
    		Move 1: From (0, 1) &rarr; (0, 0) to collect the first litter &#39;L&#39; with 1 unit of energy used and 3 units remaining.
    		Move 2: From (0, 0) &rarr; (1, 0) to &#39;R&#39; to reset and restore energy back to 4.
    		Move 3: From (1, 0) &rarr; (1, 1) to collect the second litter &#39;L&#39;.
    	
    	
    	The student collects all the litter using 3 moves. Thus, the output is 3.

    Example 3:


    Input: classroom = ["L.S", "RXL"], energy = 3


    Output: -1


    Explanation:


    No valid path collects all &#39;L&#39;.

     
    Constraints:

    	1 <= m == classroom.length <= 20
    	1 <= n == classroom[i].length <= 20
    	classroom[i][j] is one of &#39;S&#39;, &#39;L&#39;, &#39;R&#39;, &#39;X&#39;, or &#39;.&#39;
    	1 <= energy <= 50
    	There is exactly one &#39;S&#39; in the grid.
    	There are at most 10 &#39;L&#39; cells in the grid.
