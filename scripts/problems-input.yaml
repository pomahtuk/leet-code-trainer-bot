    Output: 2


    Explanation:

    	At index i = 0, the value 5 is dominant as 5 > average(4, 3) = 3.5.
    	At index i = 1, the value 4 is dominant over the subarray [3].
    	Index i = 2 is not dominant as there are no elements to its right. Thus, the answer is 2.

    Example 2:


