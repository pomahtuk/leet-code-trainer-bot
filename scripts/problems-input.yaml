    ["FrontMiddleBackQueue", "pushFront", "pushBack", "pushMiddle", "pushMiddle", "popFront", "popMiddle", "popMiddle",
    "popBack", "popFront"]

    [[], [1], [2], [3], [4], [], [], [], [], []]

    Output:

